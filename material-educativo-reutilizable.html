<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ARKAIOS | Material Reutilizable</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --primary-blue: #2563eb;
            --primary-blue-dark: #1e40af;
            --bg-white: #ffffff;
            --bg-light: #f8fafc;
            --bg-lighter: #f1f5f9;
            --border-color: #e2e8f0;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --radius-md: 10px;
            --radius-lg: 14px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-light);
            color: var(--text-primary);
        }

        header {
            position: sticky;
            top: 0;
            z-index: 10;
            background: var(--bg-white);
            border-bottom: 1px solid var(--border-color);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            box-shadow: var(--shadow-sm);
        }

        .title {
            display: flex;
            align-items: baseline;
            gap: 10px;
            min-width: 220px;
        }

        .title h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            font-weight: 800;
            letter-spacing: -0.2px;
        }

        .title .hint {
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            justify-content: flex-end;
        }

        .search {
            width: min(520px, 100%);
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background: var(--bg-lighter);
        }

        .search input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            color: var(--text-primary);
            font-size: 13px;
        }

        .btn {
            border: 1px solid var(--border-color);
            background: var(--bg-white);
            color: var(--text-secondary);
            border-radius: var(--radius-md);
            padding: 10px 12px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            transition: transform 0.12s, box-shadow 0.12s, border-color 0.12s;
            box-shadow: var(--shadow-sm);
            white-space: nowrap;
        }

        .btn:hover {
            transform: translateY(-1px);
            border-color: var(--primary-blue);
            box-shadow: var(--shadow-lg);
        }

        main {
            padding: 18px 16px 24px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }

        .card {
            background: var(--bg-white);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.12s, box-shadow 0.12s, border-color 0.12s;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            min-height: 280px;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary-blue);
        }

        .thumb {
            height: 150px;
            background: linear-gradient(135deg, #0ea5e9 0%, #1e40af 100%);
            position: relative;
        }

        .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .thumb .ph {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.92);
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            font-size: 12px;
            letter-spacing: 0.3px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
        }

        .body {
            padding: 14px 14px 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .name {
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            font-size: 13px;
            line-height: 1.25;
        }

        .desc {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.35;
            white-space: pre-wrap;
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border: 1px solid var(--border-color);
            background: var(--bg-lighter);
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-secondary);
            max-width: 100%;
        }

        .chip a {
            color: inherit;
            text-decoration: none;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 220px;
        }

        .chip a:hover {
            text-decoration: underline;
            color: var(--primary-blue-dark);
        }

        .footer {
            padding: 12px 14px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .badge {
            font-size: 11px;
            font-weight: 800;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            border-radius: 999px;
            padding: 6px 10px;
            max-width: 65%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            background: var(--bg-white);
        }

        .danger {
            border-color: #fecaca;
            background: #fff1f2;
            color: #991b1b;
        }

        .danger:hover {
            border-color: #ef4444;
        }

        .empty {
            color: var(--text-muted);
            text-align: center;
            padding: 28px 12px;
        }
    </style>
</head>

<body>
    <header>
        <div class="title">
            <h1>📖 Material Reutilizable</h1>
            <div class="hint">Lee desde <code>localStorage</code></div>
        </div>

        <div class="controls">
            <div class="search" title="Buscar por título o descripción">
                <span>🔎</span>
                <input id="q" type="text" placeholder="Buscar material..." autocomplete="off" />
            </div>
            <button class="btn" id="refreshBtn">Actualizar</button>
        </div>
    </header>

    <main>
        <div id="grid" class="grid"></div>
        <div id="empty" class="empty" style="display:none;">No hay material guardado todavía.</div>
    </main>

    <script>
        const STORAGE_KEY = 'arkaios_workspace';

        function prettifyTargetName(target) {
            const t = String(target ?? '').trim();
            if (!t) return 'Plantilla';
            const base = t.replace(/\.html?$/i, '');
            return base
                .replaceAll('_', ' ')
                .replaceAll('-', ' ')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function truncate(str, maxLen) {
            const s = String(str ?? '');
            if (s.length <= maxLen) return s;
            return s.slice(0, Math.max(0, maxLen - 1)).trimEnd() + '…';
        }

        function extractUrls(text) {
            const s = String(text ?? '');
            const urls = [];
            const re = /https?:\/\/[^\s<>\")\]]+/gi;
            let m;
            while ((m = re.exec(s)) !== null) urls.push(m[0]);
            return Array.from(new Set(urls)).slice(0, 10);
        }

        function prettifyUrlLabel(url) {
            try {
                const u = new URL(url);
                return (u.hostname || url).replace(/^www\./, '');
            } catch {
                return url;
            }
        }

        function loadItems() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            } catch {
                return [];
            }
        }

        function isInsideEditorIframe() {
            try {
                return window.parent && window.parent !== window && typeof window.parent.loadWorkspaceItem === 'function';
            } catch {
                return false;
            }
        }

        function openInEditor(index) {
            if (!isInsideEditorIframe()) return false;
            try {
                window.parent.loadWorkspaceItem(index);
                return true;
            } catch {
                return false;
            }
        }

        function deleteInEditor(index) {
            if (!isInsideEditorIframe()) return false;
            try {
                if (typeof window.parent.removeWorkspaceItem === 'function') {
                    window.parent.removeWorkspaceItem(index);
                } else {
                    // fallback local
                    const items = loadItems();
                    items.splice(index, 1);
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
                }
                return true;
            } catch {
                return false;
            }
        }

        function render(items, q) {
            const grid = document.getElementById('grid');
            const empty = document.getElementById('empty');
            grid.innerHTML = '';

            const query = String(q ?? '').trim().toLowerCase();
            const filtered = query
                ? items.filter(it => String(it?.name ?? '').toLowerCase().includes(query) || String(it?.description ?? '').toLowerCase().includes(query))
                : items;

            if (!filtered.length) {
                empty.style.display = 'block';
                return;
            }
            empty.style.display = 'none';

            filtered.forEach((item, filteredIdx) => {
                // Map back to original index for parent interactions
                const originalIndex = query ? items.indexOf(item) : filteredIdx;

                const card = document.createElement('div');
                card.className = 'card';
                card.addEventListener('click', () => {
                    const ok = openInEditor(originalIndex);
                    if (!ok) {
                        alert('Este módulo se usa dentro del editor ARKAIOS. Abre index.html para cargar un material.');
                    }
                });

                const thumb = document.createElement('div');
                thumb.className = 'thumb';
                if (item?.thumbnail) {
                    const img = document.createElement('img');
                    img.src = item.thumbnail;
                    img.alt = 'Vista previa';
                    thumb.appendChild(img);
                } else {
                    const ph = document.createElement('div');
                    ph.className = 'ph';
                    ph.textContent = 'VISTA PREVIA';
                    thumb.appendChild(ph);
                }

                const body = document.createElement('div');
                body.className = 'body';

                const name = document.createElement('div');
                name.className = 'name';
                name.textContent = item?.name || 'Sin título';

                const desc = document.createElement('div');
                desc.className = 'desc';
                const d = String(item?.description ?? '');
                desc.textContent = d ? truncate(d, 180) : 'Sin descripción';
                if (!d) desc.style.color = 'var(--text-muted)';

                body.appendChild(name);
                body.appendChild(desc);

                const links = Array.isArray(item?.links) && item.links.length ? item.links : extractUrls(d);
                if (links.length) {
                    const chips = document.createElement('div');
                    chips.className = 'chips';
                    links.slice(0, 3).forEach((url) => {
                        const chip = document.createElement('span');
                        chip.className = 'chip';

                        const a = document.createElement('a');
                        a.href = url;
                        a.target = '_blank';
                        a.rel = 'noopener noreferrer';
                        a.textContent = prettifyUrlLabel(url);
                        a.addEventListener('click', (e) => e.stopPropagation());

                        chip.appendChild(document.createTextNode('🔗 '));
                        chip.appendChild(a);
                        chips.appendChild(chip);
                    });
                    body.appendChild(chips);
                }

                const footer = document.createElement('div');
                footer.className = 'footer';

                const badge = document.createElement('span');
                badge.className = 'badge';
                badge.textContent = '🧩 ' + prettifyTargetName(item?.template);

                const del = document.createElement('button');
                del.className = 'btn danger';
                del.textContent = 'Eliminar';
                del.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (!confirm('¿Eliminar este material?')) return;
                    const ok = deleteInEditor(originalIndex);
                    if (!ok) {
                        const itemsNow = loadItems();
                        itemsNow.splice(originalIndex, 1);
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(itemsNow));
                    }
                    refresh();
                });

                footer.appendChild(badge);
                footer.appendChild(del);

                card.appendChild(thumb);
                card.appendChild(body);
                card.appendChild(footer);
                grid.appendChild(card);
            });
        }

        function refresh() {
            const items = loadItems();
            const q = document.getElementById('q').value;
            render(items, q);
        }

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('refreshBtn').addEventListener('click', refresh);
            document.getElementById('q').addEventListener('input', refresh);
            refresh();
        });
    </script>
</body>

</html>
