<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ARKAIOS EDITOR - NEXUS v3.0 [Audit V1.1]</title>

    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <!-- FUENTES FUTURISTAS -->
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap"
        rel="stylesheet">

    <!-- DETECTOR IFRAME -->
    <script>
        if (window.self !== window.top) {
            document.documentElement.classList.add('is-iframe');
        }
        // Configurar worker para PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

    <style>
        /* ========== VARIABLES CYBERPUNK ========== */
        :root {
            /* Colores base neón */
            --neon-cyan: #00f3ff;
            --neon-magenta: #ff00e6;
            --neon-blue: #0066ff;
            --neon-purple: #6a00ff;
            --neon-green: #00ff9d;
            --neon-yellow: #ffee00;

            /* Fondos oscuros */
            --bg-primary: #0a0a12;
            --bg-secondary: #11101f;
            --bg-tertiary: #1c1b2e;

            /* Gradientes futuristas */
            --gradient-cyber: linear-gradient(135deg, var(--neon-cyan) 0%, var(--neon-purple) 50%, var(--neon-magenta) 100%);
            --gradient-dark: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            --grid-overlay:
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);

            /* Texto */
            --text-primary: #e0e0ff;
            --text-secondary: #a0a0d0;
            --text-muted: #606090;

            /* Sombras de glow */
            --glow-cyan: 0 0 15px rgba(0, 243, 255, 0.8);
            --glow-magenta: 0 0 15px rgba(255, 0, 230, 0.8);
            --glow-purple: 0 0 15px rgba(106, 0, 255, 0.6);
            --shadow-deep: 0 10px 40px rgba(0, 0, 0, 0.5);

            /* Bordes */
            --border-cyber: 1px solid rgba(0, 243, 255, 0.3);
        }

        /* ========== RESET & BASE ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            position: relative;
        }

        /* ========== GRID MATRIX BACKGROUND ========== */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--grid-overlay);
            background-size: 40px 40px;
            z-index: 0;
            pointer-events: none;
            opacity: 0.3;
        }

        /* ========== PARTICULAS ANIMADAS ========== */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--neon-cyan);
            border-radius: 50%;
            animation: float-particle 10s infinite;
            box-shadow: var(--glow-cyan);
        }

        @keyframes float-particle {

            0%,
            100% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(-100vh) translateX(50px);
                opacity: 0;
            }
        }

        /* ========== GLASSMORPHISM HEADER ========== */
        header {
            position: relative;
            z-index: 1000;
            padding: 20px 40px;
            background: rgba(17, 16, 31, 0.6);
            backdrop-filter: blur(20px);
            border-bottom: var(--border-cyber);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-deep);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: var(--gradient-cyber);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            animation: pulse-logo 2s infinite;
            box-shadow: var(--glow-cyan), var(--glow-purple);
        }

        @keyframes pulse-logo {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }
        }

        .logo h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 36px;
            font-weight: 900;
            background: var(--gradient-cyber);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: var(--glow-cyan);
            letter-spacing: 2px;
        }

        .logo .version {
            background: var(--gradient-cyber);
            color: var(--bg-primary);
            padding: 6px 16px;
            border-radius: 25px;
            font-size: 12px;
            font-weight: 700;
            box-shadow: var(--glow-cyan);
        }

        /* ========== CYBERPUNK BUTTONS ========== */
        .btn-premium {
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: rgba(0, 243, 255, 0.1);
            color: var(--neon-cyan);
            border: 2px solid var(--neon-cyan);
            box-shadow: var(--glow-cyan);
        }

        .btn-primary:hover {
            background: var(--neon-cyan);
            color: var(--bg-primary);
            transform: translateY(-3px);
            box-shadow: var(--glow-cyan), 0 5px 20px rgba(0, 243, 255, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 0, 230, 0.1);
            color: var(--neon-magenta);
            border: 2px solid var(--neon-magenta);
            box-shadow: var(--glow-magenta);
        }

        .btn-secondary:hover {
            background: var(--neon-magenta);
            color: var(--bg-primary);
            transform: translateY(-3px);
            box-shadow: var(--glow-magenta), 0 5px 20px rgba(255, 0, 230, 0.5);
        }

        /* ========== FUTURISTIC SIDEBAR ========== */
        nav {
            width: 320px;
            background: rgba(17, 16, 31, 0.7);
            backdrop-filter: blur(20px);
            border-right: var(--border-cyber);
            padding: 30px 20px;
            overflow-y: auto;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 999;
            box-shadow: var(--shadow-deep);
        }

        nav.collapsed {
            width: 0;
            padding: 0;
            border-right: none;
        }

        .nav-section {
            margin-bottom: 40px;
        }

        .nav-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--neon-cyan);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: var(--glow-cyan);
        }

        /* ========== TEMPLATE BUTTONS - 3D EFFECT ========== */
        .btn {
            width: 100%;
            padding: 16px 20px;
            margin-bottom: 12px;
            background: rgba(28, 27, 46, 0.5);
            border: var(--border-cyber);
            border-radius: 14px;
            color: var(--text-secondary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s;
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 243, 255, 0.2), transparent);
            transition: left 0.6s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateX(8px) scale(1.02);
            border-color: var(--neon-magenta);
            color: var(--neon-cyan);
            box-shadow: var(--glow-cyan);
            background: rgba(28, 27, 46, 0.8);
        }

        .btn.active {
            background: var(--gradient-cyber);
            color: var(--bg-primary);
            border-color: transparent;
            box-shadow: var(--glow-cyan), var(--glow-purple);
            font-weight: 700;
        }

        .btn-icon {
            font-size: 22px;
            filter: drop-shadow(0 0 5px currentColor);
        }

        /* ========== TOGGLE BUTTON CYBER ========== */
        .toggle-nav {
            position: fixed;
            left: 320px;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 80px;
            background: rgba(0, 243, 255, 0.1);
            border: var(--border-cyber);
            border-left: none;
            border-radius: 0 20px 20px 0;
            color: var(--neon-cyan);
            font-size: 20px;
            cursor: pointer;
            transition: all 0.4s;
            z-index: 1001;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-deep);
            font-weight: bold;
        }

        .toggle-nav:hover {
            width: 44px;
            background: rgba(0, 243, 255, 0.2);
            box-shadow: var(--glow-cyan);
        }

        nav.collapsed+.toggle-nav {
            left: 0;
        }

        /* ========== MAIN LAYOUT ========== */
        .layout {
            display: flex;
            flex: 1;
            height: 100%;
            position: relative;
            z-index: 2;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 0;
        }

        /* ========== VIEW CONTROLS FLOATING ========== */
        .view-controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 15px;
            align-items: center;
            padding: 16px 32px;
            background: rgba(17, 16, 31, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 50px;
            border: var(--border-cyber);
            box-shadow: var(--shadow-deep), var(--glow-cyan);
        }

        /* ========== ZOOM CONTROL CYBER ========== */
        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--neon-cyan);
        }

        .zoom-slider {
            width: 120px;
            height: 6px;
            background: rgba(0, 243, 255, 0.2);
            border-radius: 3px;
            outline: none;
            cursor: pointer;
            -webkit-appearance: none;
        }

        .zoom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--neon-cyan);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: var(--glow-cyan);
        }

        .zoom-value {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            min-width: 50px;
            text-shadow: var(--glow-cyan);
        }

        /* ========== WORKSPACE & PDF GRID ========== */
        #frameWrapper {
            flex: 1;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        /* ========== PINTEREST-STYLE PDF GRID ========== */
        .pdf-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
            padding: 30px;
            overflow-y: auto;
            height: 100%;
        }

        .pdf-card {
            background: rgba(28, 27, 46, 0.5);
            border: var(--border-cyber);
            border-radius: 18px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
            aspect-ratio: 3/4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .pdf-card:hover {
            transform: translateY(-8px) scale(1.03);
            box-shadow: var(--glow-cyan), var(--glow-purple);
            border-color: var(--neon-magenta);
            background: rgba(28, 27, 46, 0.8);
        }

        .pdf-card::before {
            content: '📄';
            font-size: 60px;
            filter: drop-shadow(0 0 10px var(--neon-cyan));
            margin-bottom: 15px;
        }

        .pdf-card .name {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: var(--neon-cyan);
            text-align: center;
            text-shadow: var(--glow-cyan);
            margin-bottom: 8px;
        }

        .pdf-card .info {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
        }

        .pdf-card .actions {
            position: absolute;
            bottom: 15px;
            display: flex;
            gap: 10px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .pdf-card:hover .actions {
            opacity: 1;
        }

        .action-btn {
            padding: 8px 12px;
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid var(--neon-cyan);
            border-radius: 8px;
            color: var(--neon-cyan);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .action-btn:hover {
            background: var(--neon-cyan);
            color: var(--bg-primary);
            box-shadow: var(--glow-cyan);
        }

        /* ========== MODAL CYBER UPLOAD ========== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 3000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            border: var(--border-cyber);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 600px;
            box-shadow: var(--shadow-deep), var(--glow-cyan);
            position: relative;
        }

        .modal-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            color: var(--neon-cyan);
            text-shadow: var(--glow-cyan);
            margin-bottom: 30px;
        }

        .upload-zone {
            border: 3px dashed var(--neon-cyan);
            border-radius: 18px;
            padding: 60px 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s;
            background: rgba(0, 243, 255, 0.05);
        }

        .upload-zone:hover {
            border-color: var(--neon-magenta);
            background: rgba(255, 0, 230, 0.05);
            box-shadow: var(--glow-magenta);
        }

        .upload-zone.dragover {
            background: rgba(0, 243, 255, 0.1);
            box-shadow: var(--glow-cyan);
        }

        /* ========== IFRAME PLANTILLAS ========== */
        #plantillaFrame {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            background: white;
        }

        /* ========== SCROLLBAR CYBER ========== */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(28, 27, 46, 0.5);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gradient-cyber);
            border-radius: 5px;
            box-shadow: var(--glow-cyan);
        }

        /* ========== COMPACT MODE ZEN ========== */
        body.compact-mode header,
        body.compact-mode nav,
        body.compact-mode .toggle-nav {
            display: none !important;
        }

        body.compact-mode .view-controls {
            bottom: 20px;
            padding: 12px 24px;
        }

        /* ========== INDICATOR ========== */
        .auto-save-indicator {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 28px;
            background: rgba(0, 255, 157, 0.9);
            color: var(--bg-primary);
            border-radius: 30px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 2000;
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.5);
        }

        .auto-save-indicator.show {
            opacity: 1;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            nav {
                width: 280px;
            }

            .toggle-nav {
                left: 280px;
            }

            .logo h1 {
                font-size: 24px;
            }

            .pdf-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 15px;
                padding: 20px;
            }
        }
    </style>
</head>

<body>
    <!-- PARTICULAS ANIMADAS -->
    <div class="particles" id="particles"></div>

    <!-- HEADER CYBER -->
    <header>
        <div class="logo" onclick="toggleDashboard()">
            <div class="logo-icon">🎓</div>
            <div>
                <h1>ARKAIOS</h1>
                <span class="version">NEXUS v3.0</span>
            </div>
        </div>
        <div class="header-actions">
            <button class="btn-premium btn-secondary" onclick="window.location.reload()">
                <span>🔄</span>
                <span>Reboot</span>
            </button>
            <button class="btn-premium btn-primary" id="saveBtn">
                <span>💾</span>
                <span>Guardar Estado</span>
            </button>
        </div>
    </header>

    <!-- LAYOUT PRINCIPAL -->
    <div class="layout">
        <!-- SIDEBAR CYBER -->
        <nav id="sidebar">
            <div class="nav-section">
                <div class="nav-title">
                    <span>📝</span>
                    <span>Modulos Texto</span>
                </div>
                <button class="btn active" data-target="plantilla_escolar_carta_mx_autoajuste_y_areas_editables.html">
                    <span class="btn-icon">📄</span>
                    <span>Carta MX - Índice + Texto</span>
                </button>
                <button class="btn" data-target="hoja_milimetrica_interactiva.html">
                    <span class="btn-icon">📐</span>
                    <span>Hoja Milimétrica</span>
                </button>
                <button class="btn" data-target="biografia_profesional.html">
                    <span class="btn-icon">👤</span>
                    <span>Biografía Profesional</span>
                </button>
            </div>

            <div class="nav-section">
                <div class="nav-title">
                    <span>📸</span>
                    <span>Modulos Imagen</span>
                </div>
                <button class="btn" data-target="generador-fotos-infantiles.html">
                    <span class="btn-icon">👶</span>
                    <span>Fotos Infantiles 2.5×3 cm</span>
                </button>
                <button class="btn" data-target="plantilla_circulos_jack.html">
                    <span class="btn-icon">⭕</span>
                    <span>Círculos Jack Skellington</span>
                </button>
                <button class="btn" data-target="plantilla-cuadros-imagenes-v2.html">
                    <span class="btn-icon">🖼️</span>
                    <span>Cuadros Imágenes v2</span>
                </button>
                <button class="btn" data-target="plantilla-imagenes-v2.html">
                    <span class="btn-icon">🎨</span>
                    <span>Plantilla Imágenes v2</span>
                </button>
            </div>

            <div class="nav-section">
                <div class="nav-title">
                    <span>🏗️</span>
                    <span>Workspace Proyectos</span>
                </div>
                <div id="workspace-list"></div>
                <button class="btn" onclick="addNewWorkspaceItem()">
                    <span class="btn-icon">➕</span>
                    <span>Guardar Proyecto</span>
                </button>
            </div>

            <div class="nav-section">
                <div class="nav-title">
                    <span>📁</span>
                    <span>Base PDFs</span>
                </div>
                <div id="works-base-list"></div>
                <button class="btn" onclick="openUploadModal()">
                    <span class="btn-icon">📤</span>
                    <span>Subir PDF / Continuar</span>
                </button>
            </div>
        </nav>

        <button class="toggle-nav" id="toggleNav" title="Ocultar/Mostrar menú">‹</button>

        <main>
            <!-- CONTROLES FLOATING -->
            <div class="view-controls">
                <div class="zoom-controls">
                    <span>🔍</span>
                    <input type="range" min="50" max="150" value="100" class="zoom-slider" id="zoomSlider"
                        oninput="updateZoom(this.value)">
                    <span class="zoom-value" id="zoomValue">100%</span>
                </div>
                <button class="btn-premium btn-secondary" onclick="toggleCompactMode()" id="compactBtn">
                    <span>🧘</span>
                    <span>Zen Mode</span>
                </button>
                <button class="btn-premium btn-secondary" onclick="toggleFullscreen()" id="fullscreenBtn">
                    <span>⛶</span>
                    <span>Fullscreen</span>
                </button>
                <button class="btn-premium btn-primary" id="downloadBtn">
                    <span>📥</span>
                    <span>Exportar PDF</span>
                </button>
            </div>

            <!-- CONTENEDOR PRINCIPAL -->
            <div id="frameWrapper">
                <!-- DASHBOARD VISUAL -->
                <div id="dashboardContainer" class="pdf-grid"></div>

                <!-- IFRAME DE PLANTILLAS -->
                <iframe id="plantillaFrame" src="about:blank"></iframe>
            </div>
        </main>
    </div>

    <!-- MODAL SUBIR PDF -->
    <div class="modal-overlay" id="uploadModal">
        <div class="modal-content">
            <h2 class="modal-title">📤 SUBIR PDF PARA CONTINUAR</h2>
            <div class="upload-zone" onclick="document.getElementById('hiddenFileInput').click()">
                <div style="font-size: 48px; margin-bottom: 20px;">☁️⬆️</div>
                <p style="font-size: 18px; margin-bottom: 10px;">Arrastra tu PDF aquí o haz clic</p>
                <p style="color: var(--text-muted);">Los campos se extraerán automáticamente</p>
            </div>
            <input type="file" id="hiddenFileInput" accept=".pdf" style="display: none;"
                onchange="handlePDFUpload(event)">
            <div style="margin-top: 20px; text-align: center;">
                <button class="btn-premium btn-secondary" onclick="closeUploadModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- INDICADOR -->
    <div class="auto-save-indicator" id="autoSaveIndicator">✓ Guardado</div>

    <script>
        // ===== VARIABLES GLOBALES =====
        let currentTemplate = 'plantilla_escolar_carta_mx_autoajuste_y_areas_editables.html';
        let workspaceItems = JSON.parse(localStorage.getItem('arkaios_workspace') || '[]');
        let completedWorks = JSON.parse(localStorage.getItem('arkaios_works') || '[]');

        // ===== INICIAR PARTICULAS =====
        function initParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }

        // ===== DASHBOARD PINTEREST-STYLE =====
        function renderDashboard() {
            const container = document.getElementById('dashboardContainer');
            container.innerHTML = '';

            // Sección Proyectos Guardados
            const wsSection = document.createElement('div');
            wsSection.innerHTML = `<div style="grid-column: 1 / -1; margin-bottom: 20px;">
                <h2 style="font-family: Orbitron; color: var(--neon-cyan); text-shadow: var(--glow-cyan);">
                    🏗️ PROYECTOS GUARDADOS
                </h2>
            </div>`;

            if (workspaceItems.length === 0) {
                wsSection.innerHTML += `<div style="grid-column: 1 / -1; text-align: center; color: var(--text-muted);">
                    No hay proyectos guardados
                </div>`;
            } else {
                workspaceItems.forEach((item, index) => {
                    const card = createPDFCard(item.name, '🏗️', 'Proyecto', () => loadWorkspaceItem(index), () => removeWorkspaceItem(index));
                    wsSection.appendChild(card);
                });
            }
            container.appendChild(wsSection);

            // Sección PDFs Finalizados
            const pdfSection = document.createElement('div');
            pdfSection.innerHTML = `<div style="grid-column: 1 / -1; margin: 40px 0 20px;">
                <h2 style="font-family: Orbitron; color: var(--neon-magenta); text-shadow: var(--glow-magenta);">
                    📚 TRABAJOS FINALIZADOS
                </h2>
            </div>`;

            if (completedWorks.length === 0) {
                pdfSection.innerHTML += `<div style="grid-column: 1 / -1; text-align: center; color: var(--text-muted);">
                    No hay PDFs guardados
                </div>`;
            } else {
                completedWorks.forEach((item, index) => {
                    const card = createPDFCard(item.name, '📄', 'PDF Finalizado', () => downloadWork(index), () => removeWork(index));
                    pdfSection.appendChild(card);
                });
            }
            container.appendChild(pdfSection);
        }

        function createPDFCard(name, icon, type, onClick, onDelete) {
            const card = document.createElement('div');
            card.className = 'pdf-card';
            card.onclick = onClick;
            card.innerHTML = `
                <div style="font-size: 60px; margin-bottom: 15px; filter: drop-shadow(0 0 10px var(--neon-cyan));">${icon}</div>
                <div class="name" style="font-size: 14px;">${name}</div>
                <div class="info" style="font-size: 12px; color: var(--text-muted);">${type}</div>
                <div class="actions" onclick="event.stopPropagation();">
                    <button class="action-btn" onclick="${onDelete.toString().replace(/"/g, '&quot;')}">🗑️</button>
                </div>
            `;
            return card;
        }

        // ===== SUBIR PDF Y CONTINUAR =====
        function openUploadModal() {
            document.getElementById('uploadModal').classList.add('active');
        }

        function closeUploadModal() {
            document.getElementById('uploadModal').classList.remove('active');
        }

        async function handlePDFUpload(event) {
            const file = event.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function (e) {
                const pdfData = e.target.result;

                // Guardar en base de trabajos
                completedWorks.push({
                    name: file.name,
                    data: pdfData,
                    timestamp: Date.now(),
                    status: 'imported'
                });
                localStorage.setItem('arkaios_works', JSON.stringify(completedWorks));

                // Intentar extraer texto (versión simplificada)
                showIndicator('Extrayendo contenido del PDF...');

                // VER NOTA IMPORTANTE ABAJO
                await extractPDFContent(pdfData);

                closeUploadModal();
                showIndicator('¡PDF importado! Puedes continuar editando.');
                renderDashboard();
            };
            reader.readAsDataURL(file);
        }

        // ===== NOTA IMPORTANTE SOBRE EXTRACCIÓN DE PDF =====
        // La extracción completa de PDF a formato editable HTML es extremadamente compleja
        // y requiere OCR + análisis de layout. Para este proyecto, implementaremos:
        // 1. Extraer texto básico usando PDF.js
        // 2. Crear una plantilla genérica con campos editables
        // 3. Asignar el texto extraído a esos campos
        // 4. Permitir al usuario reorganizar el contenido

        async function extractPDFContent(pdfData) {
            try {
                const loadingTask = pdfjsLib.getDocument(pdfData);
                const pdf = await loadingTask.promise;
                const textContent = [];

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const text = await page.getTextContent();
                    const pageText = text.items.map(item => item.str).join(' ');
                    textContent.push(pageText);
                }

                // GUARDAR COMO NUEVO PROYECTO CON CONTENIDO EXTRAÍDO
                const projectName = `PDF Importado ${new Date().toLocaleDateString()}`;
                workspaceItems.push({
                    name: projectName,
                    template: currentTemplate,
                    data: {
                        extractedText: textContent.join('\n\n'),
                        imported: true
                    },
                    timestamp: Date.now()
                });
                localStorage.setItem('arkaios_workspace', JSON.stringify(workspaceItems));

            } catch (error) {
                console.error('Error al procesar PDF:', error);
                showIndicator('Error: No se pudo extraer texto del PDF');
            }
        }

        // ===== FUNCIONES EXISTENTES (MEJORADAS) =====
        function loadTemplate(target) {
            currentTemplate = target;
            const frame = document.getElementById('plantillaFrame');
            frame.src = target;

            document.getElementById('dashboardContainer').style.display = 'none';
            frame.style.display = 'block';

            document.querySelectorAll('.btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.target === target);
            });
        }

        function addNewWorkspaceItem() {
            const iframe = document.getElementById('plantillaFrame');
            let data = null;

            try {
                if (iframe.contentWindow && iframe.contentWindow.ARKAIOS_getData) {
                    data = iframe.contentWindow.ARKAIOS_getData();
                }
            } catch (e) {
                console.warn('No se pudieron obtener datos del iframe');
            }

            const name = prompt('🤖 Nombre del proyecto:', `Proyecto ${workspaceItems.length + 1}`);
            if (!name) return;

            workspaceItems.push({
                name: name,
                template: currentTemplate,
                data: data,
                timestamp: Date.now()
            });

            localStorage.setItem('arkaios_workspace', JSON.stringify(workspaceItems));
            showIndicator('✓ Proyecto guardado en Workspace');
            renderDashboard();
        }

        function loadWorkspaceItem(index) {
            const item = workspaceItems[index];
            currentTemplate = item.template;
            const frame = document.getElementById('plantillaFrame');

            frame.src = item.template;
            frame.onload = () => {
                if (item.data && frame.contentWindow && frame.contentWindow.ARKAIOS_setData) {
                    frame.contentWindow.ARKAIOS_setData(item.data);
                }
            };

            document.getElementById('dashboardContainer').style.display = 'none';
            frame.style.display = 'block';
            showIndicator('✓ Proyecto cargado desde Workspace');
        }

        function removeWorkspaceItem(index) {
            if (confirm('⚠️ ¿Eliminar este proyecto permanentemente?')) {
                workspaceItems.splice(index, 1);
                localStorage.setItem('arkaios_workspace', JSON.stringify(workspaceItems));
                renderDashboard();
                showIndicator('✓ Proyecto eliminado');
            }
        }

        function downloadWork(index) {
            const item = completedWorks[index];
            const link = document.createElement('a');
            link.href = item.data;
            link.download = item.name;
            link.click();
            showIndicator('✓ Descarga iniciada');
        }

        function removeWork(index) {
            if (confirm('⚠️ ¿Eliminar este PDF?')) {
                completedWorks.splice(index, 1);
                localStorage.setItem('arkaios_works', JSON.stringify(completedWorks));
                renderDashboard();
                showIndicator('✓ PDF eliminado');
            }
        }

        function updateZoom(value) {
            const iframe = document.getElementById('plantillaFrame');
            const display = document.getElementById('zoomValue');
            iframe.style.transform = `scale(${value / 100})`;
            iframe.style.transformOrigin = 'top center';
            display.textContent = value + '%';
        }

        function toggleCompactMode() {
            document.body.classList.toggle('compact-mode');
            showIndicator(document.body.classList.contains('compact-mode') ? '✓ Modo Zen activado' : '✓ Modo Zen desactivado');
        }

        function toggleFullscreen() {
            const wrapper = document.getElementById('frameWrapper');
            if (!document.fullscreenElement) {
                // Try standard fullscreen API first
                if (wrapper.requestFullscreen) {
                    wrapper.requestFullscreen();
                } else {
                    // Fallback to CSS class for iframe sizing if API not supported/desired
                    wrapper.classList.toggle('fullscreen');
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        function showIndicator(msg) {
            const indicator = document.getElementById('autoSaveIndicator');
            indicator.textContent = msg;
            indicator.classList.add('show');
            setTimeout(() => indicator.classList.remove('show'), 3000);
        }

        // ===== INICIALIZACIÓN =====
        window.onload = function () {
            initParticles();
            renderDashboard();

            // Cargar plantilla inicial
            const frame = document.getElementById('plantillaFrame');
            frame.src = currentTemplate;

            // Configurar drag & drop para PDF
            const uploadZone = document.querySelector('.upload-zone');
            if (uploadZone) {
                uploadZone.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    uploadZone.classList.add('dragover');
                });
                uploadZone.addEventListener('dragleave', () => {
                    uploadZone.classList.remove('dragover');
                });
                uploadZone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    uploadZone.classList.remove('dragover');
                    handlePDFUpload({ files: e.dataTransfer.files });
                });
            }

            // Toggle sidebar
            const toggleNav = document.getElementById('toggleNav');
            if (toggleNav) {
                toggleNav.addEventListener('click', function () {
                    const nav = document.getElementById('sidebar');
                    nav.classList.toggle('collapsed');
                    this.textContent = nav.classList.contains('collapsed') ? '›' : '‹';
                });
            }

            // Navegación de botones
            document.querySelectorAll('.btn[data-target]').forEach(btn => {
                btn.addEventListener('click', () => loadTemplate(btn.dataset.target));
            });

            // Botón exportar PDF
            const downloadBtn = document.getElementById('downloadBtn');
            if (downloadBtn) {
                downloadBtn.addEventListener('click', async () => {
                    showIndicator('🖨️ Generando PDF...');
                    const iframe = document.getElementById('plantillaFrame');
                    try {
                        // Intentar usar la función de impresión nativa de la plantilla
                        if (iframe.contentWindow && iframe.contentWindow.print) {
                            iframe.contentWindow.print();
                            showIndicator('✓ Diálogo de impresión abierto');
                            return;
                        }
                        // Fallback a captura
                        const canvas = await html2canvas(iframe.contentDocument.body, {
                            scale: 2,
                            useCORS: true,
                            logging: false
                        });

                        const imgData = canvas.toDataURL('image/png');
                        const { jsPDF } = window.jspdf;
                        const pdf = new jsPDF({
                            orientation: 'portrait',
                            unit: 'mm',
                            format: 'letter'
                        });

                        const imgWidth = 210;
                        const imgHeight = (canvas.height * imgWidth) / canvas.width;
                        pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
                        pdf.save(`ARKAIOS_${Date.now()}.pdf`);
                        showIndicator('✓ PDF exportado exitosamente');
                    } catch (error) {
                        console.error('Error:', error);
                        // Fallback final: usar window.print()
                        window.print();
                    }
                });
            }

            // Mostrar dashboard inicialmente
            document.getElementById('plantillaFrame').style.display = 'none';
            document.getElementById('dashboardContainer').style.display = 'grid';
        };
    </script>
</body>

</html>
