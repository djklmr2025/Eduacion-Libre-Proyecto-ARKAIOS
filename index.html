<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ARKAIOS Plantillas - Centro Educativo 2025</title>

    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- CRITICAL: Detectar iframe ANTES de cargar estilos -->
    <script>
        if (window.self !== window.top) {
            document.documentElement.classList.add('is-iframe');
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Poppins:wght@300;400;500;600;700;800&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            /* Colores base modernos */
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;

            /* Gradientes premium */
            --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-secondary: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            --gradient-accent: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            --gradient-dark: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);

            /* Colores de acento */
            --accent-blue: #667eea;
            --accent-purple: #764ba2;
            --accent-orange: #fda085;
            --accent-yellow: #f6d365;

            /* Texto */
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;

            /* Bordes y sombras */
            --border-color: #334155;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.3);
            --shadow-glow: 0 0 20px rgba(102, 126, 234, 0.3);

            /* Estados */
            --success: #22c55e;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Fondo animado con formas decorativas */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.1) 0%, transparent 70%);
            animation: float 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -50%;
            left: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(253, 160, 133, 0.1) 0%, transparent 70%);
            animation: float 25s ease-in-out infinite reverse;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) rotate(0deg);
            }

            33% {
                transform: translate(30px, -30px) rotate(120deg);
            }

            66% {
                transform: translate(-20px, 20px) rotate(240deg);
            }
        }

        /* Ocultar elementos en iframe */
        .is-iframe body,
        .is-iframe header,
        .is-iframe nav,
        .is-iframe .toggle-nav,
        .is-iframe .ai-button,
        .is-iframe .ai-panel,
        .is-iframe .auto-save-indicator,
        .is-iframe .view-controls,
        .is-iframe .layout {
            display: none !important;
            visibility: hidden !important;
        }

        .is-iframe main {
            display: none !important;
        }

        .is-iframe {
            background: transparent !important;
        }

        /* Header premium con glassmorphism */
        header {
            padding: 20px 32px;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(102, 126, 234, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
            box-shadow: var(--shadow-md);
            position: relative;
            z-index: 100;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--gradient-primary);
            opacity: 0.5;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 16px;
            font-family: 'Playfair Display', serif;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: var(--gradient-primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: var(--shadow-glow);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                box-shadow: var(--shadow-glow);
            }

            50% {
                transform: scale(1.05);
                box-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
            }
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 900;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .logo .version {
            background: var(--gradient-secondary);
            color: var(--bg-primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            box-shadow: var(--shadow-sm);
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        /* Botones premium */
        .btn-premium {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-premium::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn-premium:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
            box-shadow: var(--shadow-md);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg), var(--shadow-glow);
        }

        .btn-secondary {
            background: rgba(51, 65, 85, 0.6);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: rgba(51, 65, 85, 0.9);
            border-color: var(--accent-blue);
        }

        /* Layout principal */
        .layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        /* Sidebar mejorado */
        nav {
            width: 280px;
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid rgba(102, 126, 234, 0.2);
            padding: 24px 0;
            overflow-y: auto;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-md);
        }

        nav.collapsed {
            width: 0;
            padding: 0;
            border-right: none;
        }

        .nav-section {
            margin-bottom: 32px;
            padding: 0 16px;
        }

        .nav-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 12px;
            padding: 0 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 8px;
            background: transparent;
            color: var(--text-secondary);
            border: none;
            border-radius: 12px;
            text-align: left;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--gradient-primary);
            transform: scaleY(0);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn:hover {
            background: rgba(102, 126, 234, 0.1);
            color: var(--text-primary);
            transform: translateX(4px);
        }

        .btn:hover::before {
            transform: scaleY(1);
        }

        .btn.active {
            background: var(--gradient-primary);
            color: white;
            font-weight: 600;
            box-shadow: var(--shadow-md);
        }

        .btn.active::before {
            transform: scaleY(1);
            background: white;
        }

        .btn-icon {
            font-size: 18px;
            min-width: 20px;
            text-align: center;
        }

        /* Toggle button mejorado */
        .toggle-nav {
            position: fixed;
            left: 280px;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 64px;
            background: var(--gradient-primary);
            border: none;
            border-radius: 0 12px 12px 0;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 101;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-md);
        }

        .toggle-nav:hover {
            width: 40px;
            box-shadow: var(--shadow-lg);
        }

        nav.collapsed+.toggle-nav {
            left: 0;
        }

        /* View Controls (Floating Bar) */
        .view-controls {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 12px;
            align-items: center;
            padding: 12px 24px;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 50px;
            border: 1px solid rgba(102, 126, 234, 0.2);
            box-shadow: var(--shadow-lg);
            transition: all 0.3s ease;
        }

        .view-controls:hover {
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transform: translateX(-50%) translateY(-2px);
        }

        /* Hide old AI FAB */
        .ai-button {
            display: none;
        }

        /* Panel AI mejorado */
        .ai-panel {
            position: fixed;
            right: -450px;
            top: 0;
            bottom: 0;
            width: 450px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            box-shadow: -10px 0 40px rgba(0, 0, 0, 0.5);
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1001;
            display: flex;
            flex-direction: column;
            border-left: 1px solid rgba(102, 126, 234, 0.3);
        }

        .ai-panel.active {
            right: 0;
        }

        /* Área principal */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-md);
        }

        .ai-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .ai-header-buttons {
            display: flex;
            gap: 8px;
        }

        .ai-header-btn {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .ai-header-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .ai-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            padding: 16px 20px;
            border-radius: 16px;
            max-width: 85%;
            word-wrap: break-word;
            animation: slideIn 0.3s ease-out;
            box-shadow: var(--shadow-sm);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            background: var(--gradient-primary);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            background: rgba(51, 65, 85, 0.6);
            color: var(--text-primary);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(102, 126, 234, 0.2);
        }

        .ai-input-area {
            padding: 20px 24px;
            background: rgba(30, 41, 59, 0.8);
            border-top: 1px solid rgba(102, 126, 234, 0.2);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .ai-input-wrapper {
            flex: 1;
            position: relative;
        }

        #aiInput {
            width: 100%;
            padding: 14px 16px;
            background: rgba(51, 65, 85, 0.6);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            transition: all 0.3s;
        }

        #aiInput:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: rgba(51, 65, 85, 0.8);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .ai-input-buttons {
            display: flex;
            gap: 8px;
        }

        .ai-input-btn {
            width: 44px;
            height: 44px;
            background: rgba(51, 65, 85, 0.6);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .ai-input-btn:hover {
            background: var(--gradient-primary);
            color: white;
            border-color: transparent;
            transform: scale(1.05);
        }

        .ai-send {
            background: var(--gradient-primary);
            color: white;
            border: none;
        }

        .ai-send:hover {
            box-shadow: var(--shadow-glow);
            transform: scale(1.1);
        }

        /* Scrollbar personalizado */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(51, 65, 85, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gradient-primary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-purple);
        }

        /* Workspace & Works Base Styles */
        #workspace-list,
        #works-base-list {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .workspace-item,
        .work-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            font-size: 13px;
            transition: all 0.3s;
        }

        .workspace-item:hover,
        .work-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .item-actions {
            display: flex;
            gap: 5px;
        }

        .action-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .action-btn:hover {
            color: white;
            background: rgba(255, 255, 255, 0.1);
        }

        /* Responsive */
        @media (max-width: 768px) {
            nav {
                width: 240px;
            }

            .toggle-nav {
                left: 240px;
            }

            .ai-panel {
                width: 100%;
                right: -100%;
            }

            .logo h1 {
                font-size: 20px;
            }

            main {
                padding: 16px;
            }
        }

        /* Loading dots animation */
        .loading-dots::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {

            0%,
            20% {
                content: '.';
            }

            40% {
                content: '..';
            }

            60%,
            100% {
                content: '...';
            }
        }

        /* Auto-save indicator */
        .auto-save-indicator {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            background: rgba(34, 197, 94, 0.9);
            backdrop-filter: blur(10px);
            color: white;
            border-radius: 24px;
            font-size: 13px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 998;
            box-shadow: var(--shadow-md);
        }

        .auto-save-indicator.show {
            opacity: 1;
        }

        /* Batch Image Button & Modal */
        .batch-img-btn {
            position: fixed;
            bottom: 110px;
            right: 32px;
            width: 64px;
            height: 64px;
            background: var(--gradient-secondary);
            border: none;
            border-radius: 50%;
            color: var(--bg-primary);
            font-size: 24px;
            cursor: pointer;
            box-shadow: var(--shadow-lg);
            transition: all 0.4s;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: float 6s ease-in-out infinite;
        }

        .batch-img-btn:hover {
            transform: scale(1.1);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            padding: 32px;
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
            border: 1px solid rgba(102, 126, 234, 0.2);
            box-shadow: var(--shadow-lg);
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .close-modal {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 24px;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .form-input,
        .form-textarea {
            width: 100%;
            padding: 12px;
            background: rgba(51, 65, 85, 0.4);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: inherit;
        }

        .form-textarea {
            height: 150px;
            resize: vertical;
        }

        /* Zoom & Compact Mode Overrides */
        #frameWrapper {
            overflow: auto !important;
        }

        #plantillaFrame {
            transform-origin: top center;
            transition: transform 0.2s ease;
        }

        /* Zoom Controls */
        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            height: 16px;
            background: var(--accent-blue);
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.3s;
        }

        .zoom-slider::-webkit-slider-thumb:hover {
            background: white;
        }

        .zoom-value {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            min-width: 40px;
        }

        /* Compact Mode (Zen) */
        body.compact-mode header {
            display: none !important;
        }

        body.compact-mode nav {
            display: none !important;
        }

        body.compact-mode .toggle-nav {
            display: none !important;
        }

        body.compact-mode main {
            padding: 0 !important;
        }

        body.compact-mode #frameWrapper {
            border-radius: 0 !important;
            border: none !important;
        }

        body.compact-mode .view-controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(30, 41, 59, 0.9);
            box-shadow: var(--shadow-lg);
            border-radius: 50px;
            padding: 10px 30px;
        }

        /* Dashboard Visual Styles */
        .dashboard-container {
            width: 100%;
            height: 100%;
            padding: 40px;
            overflow-y: auto;
            display: none;
            /* Se activa dinámicamente */
            flex-direction: column;
            gap: 32px;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.9) 0%, rgba(30, 41, 59, 0.8) 100%);
            backdrop-filter: blur(20px);
        }

        .dashboard-container.active {
            display: flex;
        }

        .dashboard-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .dashboard-section-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(102, 126, 234, 0.3);
            padding-bottom: 8px;
        }

        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .file-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .file-card:hover {
            background: rgba(102, 126, 234, 0.1);
            border-color: var(--accent-blue);
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        .file-card .icon {
            font-size: 40px;
            margin-bottom: 8px;
            display: block;
            text-align: center;
        }

        .file-card .name {
            font-weight: 600;
            color: white;
            font-size: 14px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-card .info {
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
        }

        .file-card .actions {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .file-card:hover .actions {
            opacity: 1;
        }

        .card-btn {
            background: rgba(102, 126, 234, 0.2);
            border: none;
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
        }

        .card-btn:hover {
            background: var(--accent-blue);
        }
    </style>
</head>

<body>
    <!-- Header Premium -->
    <header>
        <div class="logo" onclick="toggleDashboard()" style="cursor:pointer">
            <div class="logo-icon">🎓</div>
            <div>
                <h1>ARKAIOS</h1>
                <span class="version">Escritorio Central</span>
            </div>
        </div>
        <div class="header-actions">
            <button class="btn-premium btn-secondary" onclick="window.location.reload()">
                <span>🔄</span>
                <span>Actualizar</span>
            </button>
            <button class="btn-premium btn-primary" id="saveBtn">
                <span>💾</span>
                <span>Guardar</span>
            </button>
        </div>
    </header>

    <div class="layout">
        <!-- Sidebar Premium -->
        <nav id="sidebar">
            <div class="nav-section">
                <div class="nav-title">
                    <span>📝</span>
                    <span>Texto y Tareas</span>
                </div>
                <button class="btn active" data-target="plantilla_escolar_carta_mx_autoajuste_y_areas_editables.html">
                    <span class="btn-icon">📄</span>
                    <span>Carta MX - Índice + Texto</span>
                </button>
                <button class="btn" data-target="hoja_milimetrica_interactiva.html">
                    <span class="btn-icon">📐</span>
                    <span>Hoja Milimétrica</span>
                </button>
                <button class="btn" data-target="biografia_profesional.html">
                    <span class="btn-icon">👤</span>
                    <span>Biografía Profesional</span>
                </button>
            </div>

            <div class="nav-section">
                <div class="nav-title">
                    <span>📸</span>
                    <span>Fotografías</span>
                </div>
                <button class="btn" data-target="generador-fotos-infantiles.html">
                    <span class="btn-icon">👶</span>
                    <span>Fotos Infantiles 2.5×3 cm</span>
                </button>
                <button class="btn" data-target="plantilla_circulos_jack.html">
                    <span class="btn-icon">⭕</span>
                    <span>Círculos Jack Skellington</span>
                </button>
                <button class="btn" data-target="plantilla-cuadros-imagenes-v2.html">
                    <span class="btn-icon">🖼️</span>
                    <span>Cuadros Imágenes v2</span>
                </button>
                <button class="btn" data-target="plantilla-imagenes-v2.html">
                    <span class="btn-icon">🎨</span>
                    <span>Plantilla Imágenes v2</span>
                </button>
            </div>

            <div class="nav-section">
                <div class="nav-title">
                    <span>🏗️</span>
                    <span>Proyectos Recientes</span>
                </div>
                <div id="injected-workspace-items">
                    <!-- Automáticamente inyectados -->
                </div>
                <button class="btn" onclick="addNewWorkspaceItem()">
                    <span class="btn-icon">➕</span>
                    <span>Guardar Versión</span>
                </button>
            </div>

            <div class="nav-section">
                <div class="nav-title">
                    <span>📁</span>
                    <span>Base de Trabajos</span>
                </div>
                <div id="works-base-list" style="max-height: 200px; overflow-y: auto;">
                    <!-- Dynamic completed works -->
                </div>
                <button class="btn" onclick="document.getElementById('workUpload').click()">
                    <span class="btn-icon">📤</span>
                    <span>Subir Trabajo (.pdf)</span>
                </button>
                <input type="file" id="workUpload" accept=".pdf" style="display:none"
                    onchange="handleWorkUpload(event)">
            </div>
        </nav>

        <button class="toggle-nav" id="toggleNav" title="Ocultar/Mostrar menú">‹</button>

        <main>
            <div class="view-controls">
                <div class="zoom-controls">
                    <span class="btn-icon">🔍</span>
                    <input type="range" min="50" max="150" value="100" class="zoom-slider" id="zoomSlider"
                        oninput="updateZoom(this.value)">
                    <span class="zoom-value" id="zoomValue">100%</span>
                </div>
                <button class="btn-premium btn-secondary" onclick="toggleCompactMode()" id="compactBtn">
                    <span>🧘</span>
                    <span>Modo Zen</span>
                </button>
                <button class="btn-premium btn-secondary" onclick="toggleFullscreen()" id="fullscreenBtn">
                    <span>⛶</span>
                    <span>Pantalla completa</span>
                </button>
                <button class="btn-premium btn-primary" id="downloadBtn">
                    <span>📥</span>
                    <span>Exportar PDF</span>
                </button>
            </div>

            <div id="frameWrapper"
                style="flex: 1; width: 100%; display: flex; flex-direction: column; justify-content: center; overflow: hidden; background: rgba(0,0,0,0.2); border-radius: 24px; border: 1px solid rgba(102, 126, 234, 0.1); position: relative;">

                <!-- Dashboard Visual -->
                <div id="dashboardContainer" class="dashboard-container active">
                    <div class="dashboard-section">
                        <div class="dashboard-section-title"><span>🌟</span> Mis Proyectos</div>
                        <div id="dash-workspace-grid" class="file-grid"></div>
                    </div>

                    <div class="dashboard-section">
                        <div class="dashboard-section-title"><span>📄</span> Plantillas Maestras</div>
                        <div id="dash-templates-grid" class="file-grid"></div>
                    </div>

                    <div class="dashboard-section">
                        <div class="dashboard-section-title"><span>📂</span> Trabajos Finalizados</div>
                        <div id="dash-works-grid" class="file-grid"></div>
                    </div>
                </div>

                <!-- Iframe de Plantillas -->
                <iframe id="plantillaFrame" src="about:blank"
                    style="width: 100%; height: 100%; border: none; display: none;"></iframe>
            </div>
        </main>
    </div>

    <!-- Auto-save indicator -->
    <div class="auto-save-indicator" id="autoSaveIndicator">
        ✓ Guardado correctamente
    </div>

    <script>
        // Variables globales
        let currentTemplate = 'plantilla_escolar_carta_mx_autoajuste_y_areas_editables.html';
        let workspaceItems = JSON.parse(localStorage.getItem('arkaios_workspace') || '[]');
        let completedWorks = JSON.parse(localStorage.getItem('arkaios_works') || '[]');

        // Inicializar Workspace y Base de Trabajos
        function initLists() {
            renderWorkspace();
            renderWorksBase();
            renderDashboard();
            autoInjectWorkspace();
        }

        function toggleDashboard() {
            const dash = document.getElementById('dashboardContainer');
            const frame = document.getElementById('plantillaFrame');
            const zoomValue = document.getElementById('zoomSlider').value;

            if (dash.classList.contains('active')) {
                // Si el dashboard está activo, no hacemos nada a menos que haya una plantilla
                if (currentTemplate) hideDashboard();
            } else {
                showDashboard();
            }
        }

        function showDashboard() {
            document.getElementById('dashboardContainer').classList.add('active');
            document.getElementById('plantillaFrame').style.display = 'none';
            renderDashboard(); // Actualizar datos
        }

        function hideDashboard() {
            document.getElementById('dashboardContainer').classList.remove('active');
            document.getElementById('plantillaFrame').style.display = 'block';
        }

        function autoInjectWorkspace() {
            const container = document.getElementById('injected-workspace-items');
            if (!container) return;
            container.innerHTML = '';

            workspaceItems.forEach((item, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.dataset.target = item.template;
                btn.innerHTML = `<span class="btn-icon">📁</span><span>${item.name}</span>`;
                btn.onclick = () => loadWorkspaceItem(index);
                container.appendChild(btn);
            });
        }

        function renderDashboard() {
            // 1. Mis Proyectos (Workspace)
            const wsGrid = document.getElementById('dash-workspace-grid');
            wsGrid.innerHTML = '';
            if (workspaceItems.length === 0) wsGrid.innerHTML = '<div class="info">No tienes proyectos guardados aún.</div>';
            workspaceItems.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'file-card';
                card.onclick = () => loadWorkspaceItem(index);
                card.innerHTML = `
                    <span class="icon">🏗️</span>
                    <span class="name">${item.name}</span>
                    <span class="info">${item.template}</span>
                    <div class="actions">
                        <button class="card-btn" onclick="event.stopPropagation(); removeWorkspaceItem(${index})">Eliminar</button>
                    </div>
                `;
                wsGrid.appendChild(card);
            });

            // 2. Plantillas Maestras
            const tGrid = document.getElementById('dash-templates-grid');
            tGrid.innerHTML = '';
            const masterTemplates = [
                { name: 'Carta MX - Escolar', target: 'plantilla_escolar_carta_mx_autoajuste_y_areas_editables.html', icon: '📄' },
                { name: 'Hoja Milimétrica', target: 'hoja_milimetrica_interactiva.html', icon: '📐' },
                { name: 'Biografía Pro', target: 'biografia_profesional.html', icon: '👤' },
                { name: 'Fotos Infantiles', target: 'generador-fotos-infantiles.html', icon: '👶' }
            ];
            masterTemplates.forEach(t => {
                const card = document.createElement('div');
                card.className = 'file-card';
                card.onclick = () => loadTemplate(t.target);
                card.innerHTML = `
                    <span class="icon">${t.icon}</span>
                    <span class="name">${t.name}</span>
                    <span class="info">Plantilla Maestra</span>
                `;
                tGrid.appendChild(card);
            });

            // 3. Trabajos Finalizados
            const bfGrid = document.getElementById('dash-works-grid');
            bfGrid.innerHTML = '';
            if (completedWorks.length === 0) bfGrid.innerHTML = '<div class="info">No hay PDFs guardados.</div>';
            completedWorks.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'file-card';
                card.onclick = () => downloadWork(index);
                card.innerHTML = `
                    <span class="icon">📕</span>
                    <span class="name">${item.name}</span>
                    <span class="info">PDF Finalizado</span>
                    <div class="actions">
                        <button class="card-btn" onclick="event.stopPropagation(); removeWork(${index})">Eliminar</button>
                    </div>
                `;
                bfGrid.appendChild(card);
            });
        }

        function loadTemplate(target) {
            currentTemplate = target;
            const frame = document.getElementById('plantillaFrame');
            frame.src = target;
            hideDashboard();

            // Marcar botón activo en sidebar
            document.querySelectorAll('.btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.target === target);
            });
        }

        function renderWorkspace() {
            const list = document.getElementById('workspace-list');
            if (!list) return;
            list.innerHTML = '';
            workspaceItems.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'workspace-item';
                div.innerHTML = `
                    <span title="${item.template}">${item.name}</span>
                    <div class="item-actions">
                        <button class="action-btn" onclick="loadWorkspaceItem(${index})" title="Cargar">📂</button>
                        <button class="action-btn" onclick="injectWorkspaceItem(${index})" title="Inyectar al Menú">💉</button>
                        <button class="action-btn" onclick="removeWorkspaceItem(${index})" title="Eliminar">🗑️</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function renderWorksBase() {
            const list = document.getElementById('works-base-list');
            if (!list) return;
            list.innerHTML = '';
            completedWorks.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'work-item';
                div.innerHTML = `
                    <span>${item.name}</span>
                    <div class="item-actions">
                        <button class="action-btn" onclick="downloadWork(${index})" title="Descargar">⬇️</button>
                        <button class="action-btn" onclick="removeWork(${index})" title="Eliminar">🗑️</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function addNewWorkspaceItem() {
            const name = prompt('Nombre para esta nueva plantilla:', `Nueva Plantilla ${workspaceItems.length + 1}`);
            if (!name) return;

            const frame = document.getElementById('plantillaFrame');
            let data = null;
            try {
                if (frame.contentWindow.ARKAIOS_getData) {
                    data = frame.contentWindow.ARKAIOS_getData();
                }
            } catch (e) { console.warn('No se pudieron obtener datos del iframe'); }

            workspaceItems.push({
                name: name,
                template: currentTemplate,
                data: data,
                timestamp: Date.now()
            });
            localStorage.setItem('arkaios_workspace', JSON.stringify(workspaceItems));
            renderWorkspace();
            showIndicator('Guardado en Workspace');
        }

        function loadWorkspaceItem(index) {
            const item = workspaceItems[index];
            currentTemplate = item.template;
            const frame = document.getElementById('plantillaFrame');
            frame.src = item.template;
            frame.onload = () => {
                if (item.data && frame.contentWindow.ARKAIOS_setData) {
                    frame.contentWindow.ARKAIOS_setData(item.data);
                }
            };
            showIndicator('Cargado desde Workspace');
        }

        function injectWorkspaceItem(index) {
            const item = workspaceItems[index];
            const existingBtn = Array.from(document.querySelectorAll('.btn')).find(b => b.textContent.includes(item.name));
            if (existingBtn) {
                alert('Esta plantilla ya está en el menú');
                return;
            }

            const navSections = document.querySelectorAll('.nav-section');
            const navSection = navSections[0]; // Añadir a la primera sección (Texto y Tareas)
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.dataset.target = item.template;
            btn.innerHTML = `<span class="btn-icon">✨</span><span>${item.name}</span>`;
            btn.onclick = () => loadWorkspaceItem(index);

            navSection.appendChild(btn);
            showIndicator('Inyectado en el menú');
        }

        function removeWorkspaceItem(index) {
            if (confirm('¿Eliminar esta plantilla del workspace?')) {
                workspaceItems.splice(index, 1);
                localStorage.setItem('arkaios_workspace', JSON.stringify(workspaceItems));
                renderWorkspace();
            }
        }

        function handleWorkUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                completedWorks.push({
                    name: file.name,
                    data: e.target.result, // Base64 del PDF
                    timestamp: Date.now()
                });
                localStorage.setItem('arkaios_works', JSON.stringify(completedWorks));
                renderWorksBase();
                showIndicator('Trabajo guardado');
            };
            reader.readAsDataURL(file);
        }

        function downloadWork(index) {
            const item = completedWorks[index];
            const link = document.createElement('a');
            link.href = item.data;
            link.download = item.name;
            link.click();
        }

        function removeWork(index) {
            if (confirm('¿Eliminar este trabajo?')) {
                completedWorks.splice(index, 1);
                localStorage.setItem('arkaios_works', JSON.stringify(completedWorks));
                renderWorksBase();
            }
        }

        function showIndicator(msg) {
            const indicator = document.getElementById('autoSaveIndicator');
            if (!indicator) return;
            indicator.textContent = '✓ ' + msg;
            indicator.classList.add('show');
            setTimeout(() => indicator.classList.remove('show'), 3000);
        }

        // Descargar PDF actual
        document.getElementById('downloadBtn').addEventListener('click', async () => {
            const iframe = document.getElementById('plantillaFrame');
            try {
                // Si la plantilla tiene su propia función de impresión, usarla
                if (iframe.contentWindow.printTemplate) {
                    iframe.contentWindow.printTemplate();
                    return;
                }

                const canvas = await html2canvas(iframe.contentDocument.body, {
                    scale: 2,
                    useCORS: true,
                    logging: false
                });

                const imgData = canvas.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({
                    orientation: 'portrait',
                    unit: 'mm',
                    format: 'letter'
                });

                const imgWidth = 210;
                const imgHeight = (canvas.height * imgWidth) / canvas.width;
                pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
                pdf.save(`plantilla_${Date.now()}.pdf`);
            } catch (error) {
                console.error('Error al generar PDF:', error);
                alert('Error al generar el PDF. Por favor, intenta de nuevo o usa Ctrl+P.');
            }
        });

        // Toggle sidebar
        const toggleNav = document.getElementById('toggleNav');
        if (toggleNav) {
            toggleNav.addEventListener('click', function () {
                const nav = document.getElementById('sidebar');
                nav.classList.toggle('collapsed');
                this.classList.toggle('collapsed');
                this.textContent = nav.classList.contains('collapsed') ? '›' : '‹';
            });
        }

        // Navegación entre plantillas
        document.querySelectorAll('.btn').forEach(btn => {
            if (btn.dataset.target) {
                btn.addEventListener('click', () => {
                    loadTemplate(btn.dataset.target);
                });
            }
        });

        // Zoom logic
        function updateZoom(value) {
            const iframe = document.getElementById('plantillaFrame');
            const display = document.getElementById('zoomValue');
            const scale = value / 100;
            if (iframe) {
                iframe.style.transform = `scale(${scale})`;
                iframe.style.transformOrigin = 'top center';
            }
            if (display) display.textContent = `${value}%`;
        }

        function toggleCompactMode() {
            document.body.classList.toggle('compact-mode');
        }

        function toggleFullscreen() {
            const wrapper = document.getElementById('frameWrapper');
            if (wrapper) wrapper.classList.toggle('fullscreen');
        }

        // AI Chat (Simplified)
        const aiButton = document.getElementById('aiButton');
        const aiPanel = document.getElementById('aiPanel');
        const aiClose = document.getElementById('aiClose');

        if (aiButton) aiButton.onclick = () => aiPanel.classList.add('active');
        if (aiClose) aiClose.onclick = () => aiPanel.classList.remove('active');

        async function handleSend() {
            const input = document.getElementById('aiInput');
            if (!input) return;
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            input.value = '';

            try {
                const response = await fetch('/api/arkaios', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text })
                });
                const data = await response.json();
                addMessage(data.response || 'Respuesta de ARKAIOS', 'assistant');
            } catch (e) {
                addMessage('Error de conexión con la IA', 'assistant');
            }
        }

        function addMessage(text, type) {
            const msgArea = document.getElementById('aiMessages');
            if (!msgArea) return;
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            msgArea.appendChild(div);
            msgArea.scrollTop = msgArea.scrollHeight;
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') handleSend();
        }

        // Batch Modal functions (preserved)
        function openBatchModal() {
            const modal = document.getElementById('batchModal');
            if (modal) modal.classList.add('active');
        }

        function closeBatchModal() {
            const modal = document.getElementById('batchModal');
            if (modal) modal.classList.remove('active');
        }

        async function startBatchGeneration() {
            const category = document.getElementById('batchCategory').value.trim();
            const itemsText = document.getElementById('batchItems').value.trim();
            const statusDiv = document.getElementById('batchStatus');

            if (!category || !itemsText) {
                alert('Por favor completa todos los campos');
                return;
            }

            const items = itemsText.split('\n').map(line => line.trim()).filter(line => line);
            statusDiv.innerHTML = '⏳ Procesando... Esto puede tomar unos momentos.';
            statusDiv.style.color = 'var(--warning)';

            try {
                const response = await fetch('/api/batch-images', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ category, items })
                });

                const data = await response.json();

                if (response.ok) {
                    statusDiv.innerHTML = `✅ Completado! ${data.results.length} items procesados.`;
                    statusDiv.style.color = 'var(--success)';

                    const resultsContainer = document.createElement('div');
                    resultsContainer.id = 'batchResults';
                    resultsContainer.style.marginTop = '20px';
                    resultsContainer.style.display = 'grid';
                    resultsContainer.style.gridTemplateColumns = 'repeat(auto-fill, minmax(100px, 1fr))';
                    resultsContainer.style.gap = '10px';
                    resultsContainer.style.maxHeight = '300px';
                    resultsContainer.style.overflowY = 'auto';

                    data.results.forEach(res => {
                        if (res.status === 'found' && res.url) {
                            const div = document.createElement('div');
                            div.style.position = 'relative';
                            const img = document.createElement('img');
                            img.src = res.url;
                            img.style.width = '100%';
                            img.style.borderRadius = '8px';
                            img.title = res.item;
                            const link = document.createElement('a');
                            link.href = res.url;
                            link.download = `${category}_${res.item}.jpg`;
                            link.target = '_blank';
                            link.innerHTML = '⬇️';
                            link.style.cssText = 'position: absolute; bottom: 5px; right: 5px; background: rgba(0,0,0,0.7); color: white; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 12px;';
                            div.appendChild(img);
                            div.appendChild(link);
                            resultsContainer.appendChild(div);
                        }
                    });

                    const existingResults = document.getElementById('batchResults');
                    if (existingResults) existingResults.remove();
                    document.querySelector('.modal-content').appendChild(resultsContainer);
                } else {
                    throw new Error(data.error || 'Error desconocido');
                }
            } catch (error) {
                statusDiv.innerHTML = `❌ Error: ${error.message}`;
                statusDiv.style.color = 'var(--error)';
            }
        }

        // Inicializar
        window.onload = initLists;
    </script>
</body>

</html>
