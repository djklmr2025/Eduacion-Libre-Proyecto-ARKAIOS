<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ARKAIOS - Sistema Educativo Profesional v3.0</title>

    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <!-- FUENTES PROFESIONALES -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script>
        if (window.self !== window.top) {
            document.documentElement.classList.add('is-iframe');
        }
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

    <style>
        /* ========== VARIABLES PROFESIONALES ========== */
        :root {
            /* Paleta Educativa Profesional */
            --primary-blue: #2563eb;
            --primary-blue-dark: #1e40af;
            --primary-blue-light: #3b82f6;
            
            --secondary-gray: #64748b;
            --secondary-gray-dark: #475569;
            --secondary-gray-light: #94a3b8;
            
            /* Fondos */
            --bg-white: #ffffff;
            --bg-light: #f8fafc;
            --bg-lighter: #f1f5f9;
            --bg-gray: #e2e8f0;
            
            /* Textos */
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            
            /* Acentos */
            --accent-green: #10b981;
            --accent-orange: #f59e0b;
            --accent-red: #ef4444;
            
            /* Sombras profesionales */
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            
            /* Bordes */
            --border-color: #e2e8f0;
            --border-radius-sm: 6px;
            --border-radius-md: 10px;
            --border-radius-lg: 14px;
        }

        /* ========== RESET & BASE ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-light);
            color: var(--text-primary);
        }

        /* ========== HEADER PROFESIONAL ========== */
        header {
            position: relative;
            z-index: 1000;
            padding: 16px 32px;
            background: var(--bg-white);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .logo:hover {
            opacity: 0.8;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--primary-blue-dark) 100%);
            border-radius: var(--border-radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: var(--shadow-md);
        }

        .logo h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .logo .version {
            background: var(--bg-lighter);
            color: var(--text-secondary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid var(--border-color);
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        /* ========== BOTONES PROFESIONALES ========== */
        .btn-premium {
            padding: 10px 20px;
            border: none;
            border-radius: var(--border-radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary-blue);
            color: white;
            box-shadow: var(--shadow-sm);
        }

        .btn-primary:hover {
            background: var(--primary-blue-dark);
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--bg-white);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--bg-lighter);
            border-color: var(--secondary-gray);
        }

        /* ========== SIDEBAR PROFESIONAL ========== */
        nav {
            width: 280px;
            background: var(--bg-white);
            border-right: 1px solid var(--border-color);
            padding: 24px 16px;
            overflow-y: auto;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
        }

        nav.collapsed {
            width: 0;
            padding: 0;
            border-right: none;
        }

        .nav-section {
            margin-bottom: 32px;
        }

        .nav-title {
            font-family: 'Poppins', sans-serif;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 12px;
        }

        /* ========== BOTONES DEL MENÚ ========== */
        .btn {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 6px;
            background: transparent;
            border: none;
            border-radius: var(--border-radius-sm);
            color: var(--text-secondary);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            text-align: left;
        }

        .btn:hover {
            background: var(--bg-lighter);
            color: var(--text-primary);
        }

        .btn.active {
            background: var(--primary-blue);
            color: white;
            font-weight: 600;
            box-shadow: var(--shadow-sm);
        }

        .btn-icon {
            font-size: 18px;
            width: 20px;
            text-align: center;
        }

        /* ========== TOGGLE BUTTON ========== */
        .toggle-nav {
            position: fixed;
            left: 280px;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 64px;
            background: var(--bg-white);
            border: 1px solid var(--border-color);
            border-left: none;
            border-radius: 0 var(--border-radius-sm) var(--border-radius-sm) 0;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 1001;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-sm);
        }

        .toggle-nav:hover {
            background: var(--bg-lighter);
            color: var(--text-primary);
        }

        nav.collapsed + .toggle-nav {
            left: 0;
        }

        /* ========== LAYOUT PRINCIPAL ========== */
        .layout {
            display: flex;
            flex: 1;
            height: calc(100vh - 81px);
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-lighter);
        }

        /* ========== CONTROLES FLOTANTES ========== */
        .view-controls {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 12px;
            align-items: center;
            padding: 12px 20px;
            background: var(--bg-white);
            border-radius: 40px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-lg);
        }

        /* ========== ZOOM CONTROL ========== */
        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
            padding-right: 12px;
            border-right: 1px solid var(--border-color);
        }

        .zoom-slider {
            width: 100px;
            height: 4px;
            background: var(--bg-lighter);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
            -webkit-appearance: none;
        }

        .zoom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--primary-blue);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
        }

        .zoom-value {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 13px;
            min-width: 45px;
            color: var(--text-primary);
        }

        /* ========== WORKSPACE ========== */
        #frameWrapper {
            flex: 1;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        /* ========== GRID DE PROYECTOS ========== */
        .pdf-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 32px;
            overflow-y: auto;
            height: 100%;
        }

        .pdf-card {
            background: var(--bg-white);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-lg);
            padding: 24px;
            cursor: pointer;
            transition: all 0.2s;
            aspect-ratio: 3/4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-sm);
        }

        .pdf-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary-blue);
        }

        .pdf-card::before {
            content: '📄';
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.8;
        }

        .pdf-card .name {
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            text-align: center;
            margin-bottom: 8px;
        }

        .pdf-card .info {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
        }

        .pdf-card .actions {
            position: absolute;
            bottom: 16px;
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .pdf-card:hover .actions {
            opacity: 1;
        }

        .action-btn {
            padding: 6px 12px;
            background: var(--bg-lighter);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-sm);
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: var(--accent-red);
            color: white;
            border-color: var(--accent-red);
        }

        /* ========== MODAL ========== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 3000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-white);
            border-radius: var(--border-radius-lg);
            padding: 32px;
            width: 90%;
            max-width: 500px;
            box-shadow: var(--shadow-xl);
        }

        .modal-title {
            font-family: 'Poppins', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 24px;
        }

        .upload-zone {
            border: 2px dashed var(--border-color);
            border-radius: var(--border-radius-md);
            padding: 48px 32px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--bg-lighter);
        }

        .upload-zone:hover {
            border-color: var(--primary-blue);
            background: var(--bg-light);
        }

        .upload-zone.dragover {
            border-color: var(--primary-blue);
            background: #eff6ff;
        }

        /* ========== IFRAME ========== */
        #plantillaFrame {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            background: white;
        }

        /* ========== SCROLLBAR ========== */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-lighter);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--secondary-gray-light);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--secondary-gray);
        }

        /* ========== MODO COMPACTO ========== */
        body.compact-mode header,
        body.compact-mode nav,
        body.compact-mode .toggle-nav {
            display: none !important;
        }

        body.compact-mode .layout {
            height: 100vh;
        }

        /* ========== INDICADOR ========== */
        .auto-save-indicator {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            background: var(--accent-green);
            color: white;
            border-radius: 24px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 2000;
            box-shadow: var(--shadow-lg);
        }

        .auto-save-indicator.show {
            opacity: 1;
        }

        /* ========== TÍTULOS DE SECCIÓN ========== */
        .section-header {
            grid-column: 1 / -1;
            margin-bottom: 8px;
        }

        .section-header h2 {
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            nav {
                width: 260px;
            }

            .toggle-nav {
                left: 260px;
            }

            .logo h1 {
                font-size: 20px;
            }

            .pdf-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 16px;
                padding: 20px;
            }

            .view-controls {
                padding: 10px 16px;
                gap: 8px;
            }
        }
    </style>
</head>

<body>
    <!-- HEADER PROFESIONAL -->
    <header>
        <div class="logo" onclick="toggleDashboard()">
            <div class="logo-icon">🎓</div>
            <div>
                <h1>ARKAIOS</h1>
                <span class="version">v3.0 Educativo</span>
            </div>
        </div>
        <div class="header-actions">
            <button class="btn-premium btn-secondary" onclick="window.location.reload()">
                <span>🔄</span>
                <span>Actualizar</span>
            </button>
            <button class="btn-premium btn-primary" id="saveBtn">
                <span>💾</span>
                <span>Guardar</span>
            </button>
        </div>
    </header>

    <!-- LAYOUT PRINCIPAL -->
    <div class="layout">
        <!-- SIDEBAR -->
        <nav id="sidebar">
            <div class="nav-section">
                <div class="nav-title">
                    <span>📝</span>
                    <span>Módulos de Texto</span>
                </div>
                <button class="btn active" data-target="plantilla_escolar_carta_mx_autoajuste_y_areas_editables.html">
                    <span class="btn-icon">📄</span>
                    <span>Carta MX - Índice + Texto</span>
                </button>
                <button class="btn" data-target="hoja_milimetrica_interactiva.html">
                    <span class="btn-icon">📐</span>
                    <span>Hoja Milimétrica</span>
                </button>
                <button class="btn" data-target="biografia_profesional.html">
                    <span class="btn-icon">👤</span>
                    <span>Biografía Profesional</span>
                </button>
            </div>

            <div class="nav-section">
                <div class="nav-title">
                    <span>📸</span>
                    <span>Módulos de Imagen</span>
                </div>
                <button class="btn" data-target="generador-fotos-infantiles.html">
                    <span class="btn-icon">👶</span>
                    <span>Fotos Infantiles 2.5×3 cm</span>
                </button>
                <button class="btn" data-target="pixabay-descargador-lote.html">
                    <span class="btn-icon">🌐</span>
                    <span>Pixabay Descarga Lote</span>
                </button>
                <button class="btn" data-target="plantilla_circulos_jack.html">
                    <span class="btn-icon">⭕</span>
                    <span>Círculos Jack Skellington</span>
                </button>
                <button class="btn" data-target="plantilla-cuadros-imagenes-v2.html">
                    <span class="btn-icon">🖼️</span>
                    <span>Cuadros Imágenes v2</span>
                </button>
                <button class="btn" data-target="plantilla-imagenes-v2.html">
                    <span class="btn-icon">🎨</span>
                    <span>Plantilla Imágenes v2</span>
                </button>
            </div>

            <div class="nav-section">
                <div class="nav-title">
                    <span>🏗️</span>
                    <span>Proyectos</span>
                </div>
                <div id="workspace-list"></div>
                <button class="btn" onclick="addNewWorkspaceItem()">
                    <span class="btn-icon">➕</span>
                    <span>Guardar Proyecto</span>
                </button>
            </div>

            <div class="nav-section">
                <div class="nav-title">
                    <span>📁</span>
                    <span>Documentos PDF</span>
                </div>
                <div id="works-base-list"></div>
                <button class="btn" onclick="openUploadModal()">
                    <span class="btn-icon">📤</span>
                    <span>Subir PDF</span>
                </button>
            </div>
        </nav>

        <button class="toggle-nav" id="toggleNav" title="Ocultar/Mostrar menú">‹</button>

        <main>
            <!-- CONTROLES FLOTANTES -->
            <div class="view-controls">
                <div class="zoom-controls">
                    <span>🔍</span>
                    <input type="range" min="50" max="150" value="100" class="zoom-slider" id="zoomSlider"
                        oninput="updateZoom(this.value)">
                    <span class="zoom-value" id="zoomValue">100%</span>
                </div>
                <button class="btn-premium btn-secondary" onclick="toggleCompactMode()" id="compactBtn">
                    <span>👁️</span>
                    <span>Modo Enfoque</span>
                </button>
                <button class="btn-premium btn-secondary" onclick="toggleFullscreen()" id="fullscreenBtn">
                    <span>⛶</span>
                    <span>Pantalla Completa</span>
                </button>
                <button class="btn-premium btn-primary" id="downloadBtn">
                    <span>📥</span>
                    <span>Exportar PDF</span>
                </button>
            </div>

            <!-- CONTENEDOR PRINCIPAL -->
            <div id="frameWrapper">
                <!-- DASHBOARD -->
                <div id="dashboardContainer" class="pdf-grid"></div>

                <!-- IFRAME DE PLANTILLAS -->
                <iframe id="plantillaFrame" src="about:blank"></iframe>
            </div>
        </main>
    </div>

    <!-- MODAL SUBIR PDF -->
    <div class="modal-overlay" id="uploadModal">
        <div class="modal-content">
            <h2 class="modal-title">📤 Subir Documento PDF</h2>
            <div class="upload-zone" onclick="document.getElementById('hiddenFileInput').click()">
                <div style="font-size: 40px; margin-bottom: 16px;">📄</div>
                <p style="font-size: 16px; font-weight: 600; margin-bottom: 8px; color: var(--text-primary);">Arrastra tu PDF aquí o haz clic</p>
                <p style="color: var(--text-muted); font-size: 13px;">Los campos se extraerán automáticamente</p>
            </div>
            <input type="file" id="hiddenFileInput" accept=".pdf" style="display: none;"
                onchange="handlePDFUpload(event)">
            <div style="margin-top: 20px; text-align: center;">
                <button class="btn-premium btn-secondary" onclick="closeUploadModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- INDICADOR -->
    <div class="auto-save-indicator" id="autoSaveIndicator">✓ Guardado</div>

    <script>
        // ===== VARIABLES GLOBALES =====
        let currentTemplate = 'plantilla_escolar_carta_mx_autoajuste_y_areas_editables.html';
        let workspaceItems = JSON.parse(localStorage.getItem('arkaios_workspace') || '[]');
        let completedWorks = JSON.parse(localStorage.getItem('arkaios_works') || '[]');

        // ===== DASHBOARD =====
        function renderDashboard() {
            const container = document.getElementById('dashboardContainer');
            container.innerHTML = '';

            // Proyectos Guardados
            const wsSection = document.createElement('div');
            wsSection.innerHTML = `<div class="section-header">
                <h2>🏗️ Proyectos Guardados</h2>
            </div>`;

            if (workspaceItems.length === 0) {
                wsSection.innerHTML += `<div style="grid-column: 1 / -1; text-align: center; color: var(--text-muted); padding: 40px;">
                    No hay proyectos guardados
                </div>`;
            } else {
                workspaceItems.forEach((item, index) => {
                    const card = createPDFCard(item.name, '🏗️', 'Proyecto', () => loadWorkspaceItem(index), () => removeWorkspaceItem(index));
                    wsSection.appendChild(card);
                });
            }
            container.appendChild(wsSection);

            // PDFs Finalizados
            const pdfSection = document.createElement('div');
            pdfSection.innerHTML = `<div class="section-header" style="margin-top: 32px;">
                <h2>📚 Documentos Finalizados</h2>
            </div>`;

            if (completedWorks.length === 0) {
                pdfSection.innerHTML += `<div style="grid-column: 1 / -1; text-align: center; color: var(--text-muted); padding: 40px;">
                    No hay documentos guardados
                </div>`;
            } else {
                completedWorks.forEach((item, index) => {
                    const card = createPDFCard(item.name, '📄', 'PDF', () => downloadWork(index), () => removeWork(index));
                    pdfSection.appendChild(card);
                });
            }
            container.appendChild(pdfSection);
        }

        function createPDFCard(name, icon, type, onClick, onDelete) {
            const card = document.createElement('div');
            card.className = 'pdf-card';
            card.onclick = onClick;
            card.innerHTML = `
                <div style="font-size: 48px; margin-bottom: 16px; opacity: 0.8;">${icon}</div>
                <div class="name">${name}</div>
                <div class="info">${type}</div>
                <div class="actions">
                    <button class="action-btn delete-btn">🗑️ Eliminar</button>
                </div>
            `;
            
            // Agregar evento al botón eliminar
            const deleteBtn = card.querySelector('.delete-btn');
            deleteBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                onDelete();
            });
            
            return card;
        }

        function toggleDashboard() {
            const dashboard = document.getElementById('dashboardContainer');
            const iframe = document.getElementById('plantillaFrame');
            
            if (dashboard.style.display === 'none') {
                dashboard.style.display = 'grid';
                iframe.style.display = 'none';
                renderDashboard();
            }
        }

        // ===== MODAL PDF =====
        function openUploadModal() {
            document.getElementById('uploadModal').classList.add('active');
        }

        function closeUploadModal() {
            document.getElementById('uploadModal').classList.remove('active');
        }

        async function handlePDFUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function (e) {
                const pdfData = e.target.result;

                completedWorks.push({
                    name: file.name,
                    data: pdfData,
                    timestamp: Date.now(),
                    status: 'imported'
                });
                localStorage.setItem('arkaios_works', JSON.stringify(completedWorks));

                showIndicator('Extrayendo contenido del PDF...');
                await extractPDFContent(pdfData);

                closeUploadModal();
                showIndicator('¡PDF importado correctamente!');
                renderDashboard();
            };
            reader.readAsDataURL(file);
        }

        async function extractPDFContent(pdfData) {
            try {
                const loadingTask = pdfjsLib.getDocument(pdfData);
                const pdf = await loadingTask.promise;
                const textContent = [];

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const text = await page.getTextContent();
                    const pageText = text.items.map(item => item.str).join(' ');
                    textContent.push(pageText);
                }

                const projectName = `PDF Importado ${new Date().toLocaleDateString()}`;
                workspaceItems.push({
                    name: projectName,
                    template: currentTemplate,
                    data: {
                        extractedText: textContent.join('\n\n'),
                        imported: true
                    },
                    timestamp: Date.now()
                });
                localStorage.setItem('arkaios_workspace', JSON.stringify(workspaceItems));

            } catch (error) {
                console.error('Error al procesar PDF:', error);
                showIndicator('Error: No se pudo extraer texto del PDF');
            }
        }

        // ===== PLANTILLAS =====
        function loadTemplate(target) {
            currentTemplate = target;
            const frame = document.getElementById('plantillaFrame');
            frame.src = target;

            document.getElementById('dashboardContainer').style.display = 'none';
            frame.style.display = 'block';

            document.querySelectorAll('.btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.target === target);
            });
        }

        // ===== WORKSPACE =====
        function addNewWorkspaceItem() {
            const iframe = document.getElementById('plantillaFrame');
            let data = null;

            try {
                if (iframe.contentWindow && iframe.contentWindow.ARKAIOS_getData) {
                    data = iframe.contentWindow.ARKAIOS_getData();
                }
            } catch (e) {
                console.warn('No se pudieron obtener datos del iframe');
            }

            const name = prompt('Nombre del proyecto:', `Proyecto ${workspaceItems.length + 1}`);
            if (!name) return;

            workspaceItems.push({
                name: name,
                template: currentTemplate,
                data: data,
                timestamp: Date.now()
            });

            localStorage.setItem('arkaios_workspace', JSON.stringify(workspaceItems));
            showIndicator('✓ Proyecto guardado');
            renderDashboard();
        }

        function loadWorkspaceItem(index) {
            const item = workspaceItems[index];
            currentTemplate = item.template;
            const frame = document.getElementById('plantillaFrame');

            frame.src = item.template;
            frame.onload = () => {
                if (item.data && frame.contentWindow && frame.contentWindow.ARKAIOS_setData) {
                    frame.contentWindow.ARKAIOS_setData(item.data);
                }
            };

            document.getElementById('dashboardContainer').style.display = 'none';
            frame.style.display = 'block';
            showIndicator('✓ Proyecto cargado');
        }

        function removeWorkspaceItem(index) {
            if (confirm('¿Eliminar este proyecto permanentemente?')) {
                workspaceItems.splice(index, 1);
                localStorage.setItem('arkaios_workspace', JSON.stringify(workspaceItems));
                renderDashboard();
                showIndicator('✓ Proyecto eliminado');
            }
        }

        function downloadWork(index) {
            const item = completedWorks[index];
            const link = document.createElement('a');
            link.href = item.data;
            link.download = item.name;
            link.click();
            showIndicator('✓ Descarga iniciada');
        }

        function removeWork(index) {
            if (confirm('¿Eliminar este documento?')) {
                completedWorks.splice(index, 1);
                localStorage.setItem('arkaios_works', JSON.stringify(completedWorks));
                renderDashboard();
                showIndicator('✓ Documento eliminado');
            }
        }

        // ===== CONTROLES =====
        function updateZoom(value) {
            const iframe = document.getElementById('plantillaFrame');
            const display = document.getElementById('zoomValue');
            iframe.style.transform = `scale(${value / 100})`;
            iframe.style.transformOrigin = 'top center';
            display.textContent = value + '%';
        }

        function toggleCompactMode() {
            document.body.classList.toggle('compact-mode');
            showIndicator(document.body.classList.contains('compact-mode') ? '✓ Modo enfoque activado' : '✓ Modo normal');
        }

        function toggleFullscreen() {
            const wrapper = document.getElementById('frameWrapper');
            if (!document.fullscreenElement) {
                if (wrapper.requestFullscreen) {
                    wrapper.requestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        function showIndicator(msg) {
            const indicator = document.getElementById('autoSaveIndicator');
            indicator.textContent = msg;
            indicator.classList.add('show');
            setTimeout(() => indicator.classList.remove('show'), 2500);
        }

        // ===== INICIALIZACIÓN =====
        window.onload = function () {
            renderDashboard();

            const frame = document.getElementById('plantillaFrame');
            frame.src = currentTemplate;

            // Drag & drop
            const uploadZone = document.querySelector('.upload-zone');
            if (uploadZone) {
                uploadZone.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    uploadZone.classList.add('dragover');
                });
                uploadZone.addEventListener('dragleave', () => {
                    uploadZone.classList.remove('dragover');
                });
                uploadZone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    uploadZone.classList.remove('dragover');
                    handlePDFUpload({ target: { files: e.dataTransfer.files } });
                });
            }

            // Toggle sidebar
            const toggleNav = document.getElementById('toggleNav');
            if (toggleNav) {
                toggleNav.addEventListener('click', function () {
                    const nav = document.getElementById('sidebar');
                    nav.classList.toggle('collapsed');
                    this.textContent = nav.classList.contains('collapsed') ? '›' : '‹';
                });
            }

            // Botones
            document.querySelectorAll('.btn[data-target]').forEach(btn => {
                btn.addEventListener('click', () => loadTemplate(btn.dataset.target));
            });

            // Exportar PDF
            const downloadBtn = document.getElementById('downloadBtn');
            if (downloadBtn) {
                downloadBtn.addEventListener('click', async () => {
                    showIndicator('Generando PDF...');
                    const iframe = document.getElementById('plantillaFrame');
                    try {
                        if (iframe.contentWindow && iframe.contentWindow.print) {
                            iframe.contentWindow.print();
                            showIndicator('✓ Listo para imprimir');
                            return;
                        }
                        
                        const canvas = await html2canvas(iframe.contentDocument.body, {
                            scale: 2,
                            useCORS: true,
                            logging: false
                        });

                        const imgData = canvas.toDataURL('image/png');
                        const { jsPDF } = window.jspdf;
                        const pdf = new jsPDF({
                            orientation: 'portrait',
                            unit: 'mm',
                            format: 'letter'
                        });

                        const imgWidth = 210;
                        const imgHeight = (canvas.height * imgWidth) / canvas.width;
                        pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
                        pdf.save(`ARKAIOS_${Date.now()}.pdf`);
                        showIndicator('✓ PDF exportado');
                    } catch (error) {
                        console.error('Error:', error);
                        window.print();
                    }
                });
            }

            // Mostrar dashboard
            document.getElementById('plantillaFrame').style.display = 'none';
            document.getElementById('dashboardContainer').style.display = 'grid';
        };
    </script>
</body>

</html>
