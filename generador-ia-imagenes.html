<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARKAIOS BRIDGE · Canal xnaxg7ceyj · Generador Proxy</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter', system-ui, -apple-system, sans-serif;background:linear-gradient(135deg,#0a0a0a,#1a1a1a);min-height:100vh;color:#ededed; overflow-x: hidden;}

/* Custom Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #0a0a0a; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: #444; }

.header{background:rgba(255,255,255,.02);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.05);padding:20px 30px;display:flex;align-items:center;gap:15px;flex-wrap:wrap; sticky top-0 z-50}
.header h1{font-size:1.6rem; font-weight: 800; letter-spacing: -0.02em; background:linear-gradient(90deg,#ff8a00,#ff2d00);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.badge{background:rgba(255,45,0,0.1); border: 1px solid rgba(255,45,0,0.2); padding:4px 12px;border-radius:20px;font-size:11px;font-weight:bold;color:#ff5e3a; text-transform: uppercase; letter-spacing: 0.05em;}
.bridge-status{background:rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.2); color:#818cf8; padding:4px 12px;border-radius:20px;font-size:11px;font-weight:bold; text-transform: uppercase;}

.back-btn{margin-left:auto;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#fff;padding:10px 20px;border-radius:12px;cursor:pointer;font-size:13px;text-decoration:none; transition: all 0.2s;}
.back-btn:hover{background: rgba(255,255,255,.1); transform: translateY(-1px);}

.main{display:grid;grid-template-columns:380px 1fr;gap:30px;padding:30px;max-width:1600px;margin:0 auto}
.panel,.helper-panel{background:rgba(255,255,255,.03);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:25px; box-shadow: 0 20px 50px rgba(0,0,0,0.3);}
.panel h2,.helper-panel h3{font-size:1.1rem;margin-bottom:20px;color:#ff8a00; font-weight: 700; letter-spacing: -0.01em;}

.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:8px;font-weight:700;text-transform:uppercase;letter-spacing:1px}

textarea,select,input[type=range],input[type=text]{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#fff;padding:12px 15px;font-size:14px;resize:vertical; transition: all 0.2s;}
textarea:focus, select:focus, input:focus{outline: none; border-color: #ff8a00; background: rgba(255,255,255,.06);}

textarea{min-height:110px} 
select option{background:#111} 
input[type=range]{padding:4px 0;cursor:pointer;accent-color:#ff8a00}

.range-row{display:flex;align-items:center;gap:15px}.range-val{min-width:40px;text-align:right;color:#ff8a00;font-family: monospace; font-size: 16px; font-weight:bold}

.nsfw-toggle{display:flex;align-items:center;gap:15px;background:rgba(255,45,0,.05);border:1px solid rgba(255,45,0,.15);border-radius:14px;padding:15px}
.nsfw-toggle label{font-size:14px;color:#ff5e3a;font-weight:bold;cursor:pointer; margin: 0;}

.toggle-sw{position:relative;width:44px;height:24px;flex-shrink:0}.toggle-sw input{opacity:0;width:0;height:0}
.toggle-sw span{position:absolute;inset:0;background:rgba(255,255,255,.1);border-radius:24px;cursor:pointer;transition:.3s}
.toggle-sw input:checked+span{background:#ff2d00}
.toggle-sw span::after{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:3px;left:3px;transition:.3s}
.toggle-sw input:checked+span::after{left:23px}

.gen-btn,.helper-btn{width:100%;padding:16px;background:linear-gradient(135deg,#ff8a00,#ff2d00); border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:800;cursor:pointer;transition:all .3s;margin-top:10px; box-shadow: 0 10px 20px rgba(255,45,0,0.2);}
.helper-btn{padding:12px;font-size:13px; background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1); margin-top: 0;}
.gen-btn:hover{transform:translateY(-2px); filter: brightness(1.1); box-shadow: 0 15px 30px rgba(255,45,0,0.3);}
.gen-btn:active{transform:translateY(0);}
.gen-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

.quick-prompts{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.qp{background:rgba(255,138,0,.1);border:1px solid rgba(255,138,0,.2);color:#ffb366;padding:6px 12px;border-radius:20px;font-size:11px;cursor:pointer;transition:all .2s}.qp:hover{background:rgba(255,138,0,0.2); transform: scale(1.05);}

.gallery-panel{display:flex;flex-direction:column;gap:20px}.gallery-header{display:flex;align-items:center;gap:15px;flex-wrap:wrap}.gallery-header h2{color:#ff8a00;font-size:1.2rem; font-weight: 800;}
.count-badge{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,0.6);padding:4px 12px;border-radius:20px;font-size:12px; font-weight: 600;}

.progress-bar{background:rgba(255,255,255,.05);border-radius:10px;height:8px;overflow:hidden;display:none; margin: 15px 0;}.progress-fill{height:100%;background:linear-gradient(90deg,#ff8a00,#ff2d00);border-radius:10px;transition:width .4s;}

.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.img-card{background:#111;border:1px solid rgba(255,255,255,.05);border-radius:20px;overflow:hidden;transition:all .4s;position:relative}
.img-card:hover{transform:translateY(-8px);box-shadow:0 30px 60px rgba(0,0,0,0.6);border-color:rgba(255,138,0,.4)}
.img-card img{width:100%;aspect-ratio:1;object-fit:cover;display:block; transition: transform 0.6s;}
.img-card:hover img{transform: scale(1.05);}
.img-card.portrait img{aspect-ratio:9/16}.img-card.landscape img{aspect-ratio:16/9}

.img-actions{padding:12px;display:flex;gap:10px; background: #111; border-top: 1px solid rgba(255,255,255,.05);}
.img-actions button{flex:1;padding:8px;border:none;border-radius:10px;font-size:12px;cursor:pointer;font-weight:700;transition:all .2s; height: 36px; display: flex; align-items: center; justify-content: center;}
.btn-dl{background:rgba(255,255,255,.05);color:#fff}.btn-dl:hover{background:rgba(255,255,255,.1)}
.btn-del{background:rgba(255,45,0,.15);color:#ff5e3a; max-width: 40px;}.btn-del:hover{background:rgba(255,45,0,.3)}

.img-prompt-tag{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.7);backdrop-filter: blur(10px); color:#fff;font-size:10px;padding:4px 10px;border-radius:10px;max-width:calc(100% - 20px);overflow:hidden;text-overflow:ellipsis;white-space:nowrap; border: 1px solid rgba(255,255,255,0.1); z-index: 10;}
.fallback-tag{position:absolute; bottom: 60px; right: 10px; background: #6366f1; color: #fff; font-size: 8px; font-weight: 900; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; z-index: 10;}

.skeleton{background:linear-gradient(90deg, #111 25%, #1a1a1a 50%, #111 75%); background-size: 200% 100%; animation: shimmerLoad 1.5s infinite; border-radius: 20px;}
@keyframes shimmerLoad { from { background-position: 200% 0; } to { background-position: -200% 0; } }

.empty-state{text-align:center;padding:100px 20px;color:rgba(255,255,255,0.2)}.empty-state .icon{font-size:64px;margin-bottom:20px; opacity: 0.5;}

.toast{position:fixed;bottom:30px;right:30px;background:#ff8a00;color:#fff;padding:15px 25px;border-radius:16px;font-weight:bold;z-index:9999;animation:toastIn .4s cubic-bezier(0.175, 0.885, 0.32, 1.275);box-shadow: 0 20px 40px rgba(255,138,0,0.3);}
@keyframes toastIn{from{opacity:0;transform:translateY(50px) scale(0.9)}to{opacity:1;transform:translateY(0) scale(1)}}

.helper-panel{display:none}
.proxy-config{margin-top:20px;padding:20px;border:1px solid rgba(99,102,241,.2);border-radius:18px;background:rgba(99,102,241,.03)}
.proxy-config label{color:#818cf8}

@media (max-width:1024px){.main{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header">
  <span style="font-size:2.4rem">🧡</span>
  <h1>ARKAIOS BRIDGE</h1>
  <span class="bridge-status">● CANAL: xnaxg7ceyj</span>
  <span class="badge">🔥 NSFW UNLOCKED</span>
  <a href="/" class="back-btn">Regresar al Generador Principal</a>
</div>
<div class="main">
  <div class="panel">
    <h2>⚙️ Orquestador de Señal</h2>
    <div class="form-group">
      <label>Prompt Creativo (Arkaios Engine)</label>
      <textarea id="prompt" placeholder="Escribe tu prompt artístico aquí..."></textarea>
      <div class="quick-prompts" id="quickPrompts">
        <span class="qp" onclick="addToPrompt('ultra-detailed oil painting')">Oil Painting</span>
        <span class="qp" onclick="addToPrompt('cinematic WLOP lighting')">WLOP Style</span>
        <span class="qp" onclick="addToPrompt('8k hyper-realistic')">8K Ultra</span>
        <span class="qp" onclick="addToPrompt('ethereal brushwork')">Ethereal</span>
      </div>
    </div>

    <div class="form-group">
      <div class="flex items-center justify-between mb-2">
        <label>Escudo Anatómico (Grok Fix)</label>
        <button onclick="fixAnatomy()" id="grokBtn" style="background:none; border:none; color:#818cf8; font-size:10px; font-weight:700; cursor:pointer; text-transform:uppercase; letter-spacing:1px; margin-left: auto; display: block;">⚡ Optimizar con Grok</button>
      </div>
      <textarea id="negPrompt" style="min-height:70px; font-size:11px; color:rgba(255,255,255,0.5);" placeholder="Parámetros de exclusión anatómica...">mutated hands, extra limbs, missing nipples, distorted anatomy, low quality</textarea>
    </div>

    <div class="form-group">
      <label>Resolución de Canal</label>
      <select id="resolution">
        <option value="512x512">512×512 — Cuadrado</option>
        <option value="512x768">512×768 — Retrato</option>
        <option value="768x512">768×512 — Paisaje</option>
        <option value="768x768" selected>768×768 — Cuadrado Bridge HD</option>
        <option value="1024x1024">1024×1024 — Ultra Channel</option>
      </select>
    </div>

    <div class="form-group">
      <label>Ráfaga de Generación</label>
      <div class="range-row">
        <input type="range" id="count" min="1" max="8" step="1" value="4" oninput="document.getElementById('countVal').textContent=this.value">
        <span class="range-val" id="countVal">4</span>
      </div>
    </div>

    <div class="form-group">
      <div class="nsfw-toggle">
        <label class="toggle-sw"><input type="checkbox" id="nsfwToggle" checked><span></span></label>
        <label for="nsfwToggle">🔞 Bypass NSFW Bridge</label>
      </div>
    </div>

    <div class="proxy-config">
       <label style="font-size: 10px; font-weight: 800; text-transform: uppercase;">Connection Endpoint</label>
       <input type="text" id="apiUrl" style="margin-top: 8px; border-color: rgba(99,102,241, 0.3); font-family: monospace; font-size: 11px;" placeholder="Cargando señal del servidor...">
    </div>

    <button class="gen-btn" id="genBtn" onclick="generateBatch()">🚀 DISPARAR GENERACIÓN</button>
    <div id="progressBar" class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <p id="statusText" style="text-align:center;font-size:11px;color:rgba(255,255,255,0.3);margin-top:10px;"></p>
  </div>

  <div class="gallery-panel">
    <div class="gallery-header">
      <h2>🖼️ Flujo de Imágenes Arkaios</h2>
      <span class="count-badge" id="galleryCount">0 capturas</span>
      <button onclick="clearGallery()" style="margin-left:auto; background:none; border:none; color:rgba(255,255,255,0.2); font-size:11px; font-weight:700; cursor:pointer; text-transform:uppercase;">Limpiar Feed</button>
    </div>
    
    <div class="gallery" id="gallery">
      <div class="empty-state" id="emptyState" style="grid-column:1/-1;">
        <div class="icon">🛰️</div>
        <p>Esperando señal del orquestador...</p>
        <p style="font-size:12px;margin-top:10px;color:rgba(255,255,255,0.15);">Define tu prompt y abre el canal de puente</p>
      </div>
    </div>
  </div>
</div>

<script>
// Auto-detect current API endpoint
document.getElementById('apiUrl').value = window.location.origin;

let isGenerating = false;
let imagesHistory = [];

function addToPrompt(text){
  const ta = document.getElementById('prompt');
  ta.value = ta.value ? ta.value + ', ' + text : text;
  ta.focus();
}

async function fixAnatomy(){
  const promptText = document.getElementById('prompt').value.trim();
  if(!promptText) return showToast("⚠️ Escribe un prompt para que Grok lo analice.");
  
  const grokBtn = document.getElementById('grokBtn');
  grokBtn.textContent = "⚡ PENSANDO...";
  grokBtn.disabled = true;

  try {
    const resp = await fetch("/api/v1/optimize/negative-prompt", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt: promptText }),
    });
    const data = await resp.json();
    if(data.ok) {
      document.getElementById('negPrompt').value = data.negativePrompt;
      showToast("✅ Grok Fix Aplicado");
    }
  } catch(e) {
    showToast("❌ Grok Offline");
  } finally {
    grokBtn.textContent = "⚡ Optimizar con Grok";
    grokBtn.disabled = false;
  }
}

async function generateBatch(){
  if(isGenerating) return;
  const prompt = document.getElementById('prompt').value.trim();
  if(!prompt) return showToast("⚠️ Define el prompt de la señal.");

  // AUTO-FIX ANATOMY with Grok before batch if NSFW enabled and negative prompt is weak
  if (document.getElementById('nsfwToggle').checked && document.getElementById('negPrompt').value.length < 50) {
    showToast("🧠 Grok: Optimizando anatomía automáticamente...");
    await fixAnatomy();
  }

  isGenerating = true;
  const btn = document.getElementById('genBtn');
  const progressBar = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');
  const statusText = document.getElementById('statusText');
  
  btn.disabled = true;
  btn.textContent = "📡 ESTABLECIENDO PUENTE...";
  progressBar.style.display = 'block';
  document.getElementById('emptyState').style.display = 'none';

  const count = parseInt(document.getElementById('count').value);
  let successCount = 0;

  for(let i = 0; i < count; i++) {
    statusText.textContent = `Sincronizando señal ${i+1}/${count}...`;
    
    const skeleton = document.createElement('div');
    skeleton.className = 'skeleton';
    skeleton.style.height = '300px';
    document.getElementById('gallery').prepend(skeleton);

    try {
      const imgUrl = await requestImageFromBridge();
      skeleton.remove();
      renderImage(imgUrl, prompt);
      successCount++;
    } catch(e) {
      skeleton.remove();
      console.error(e);
      statusText.textContent = `⚠️ Error: ${e.message}`;
      showToast(`❌ Error: ${e.message}`);
    }
    
    progressFill.style.width = `${((i+1)/count)*100}%`;
  }

  btn.disabled = false;
  btn.textContent = "🚀 DISPARAR GENERACIÓN";
  statusText.textContent = `Canal estable. ${successCount} imágenes recibidas.`;
  isGenerating = false;
  showToast(`✅ ${successCount} Señales capturadas`);
}

async function requestImageFromBridge(){
  const apiUrl = document.getElementById('apiUrl').value;
  const payload = {
    prompt: document.getElementById('prompt').value,
    negativePrompt: document.getElementById('negPrompt').value,
    resolution: document.getElementById('resolution').value,
    adultContent: document.getElementById('nsfwToggle').checked ? 1 : 0,
    channel: "xnaxg7ceyj", 
    provider: "mock" 
  };

  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 130000); // 130s browser timeout

  try {
    const resp = await fetch(apiUrl + "/api/v1/image/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
      signal: controller.signal
    });
    clearTimeout(timeoutId);

    const data = await resp.json();
    if(!data.ok) throw new Error(data.error || "Error en Bridge");
    return data.url;
  } catch (err) {
    clearTimeout(timeoutId);
    if (err.name === 'AbortError') {
      throw new Error("Tiempo de espera agotado (Proxy Busy)");
    }
    throw err;
  }
}

function renderImage(url, promptText){
  const resolution = document.getElementById('resolution').value;
  const [w,h] = resolution.split('x').map(Number);
  const typeClass = h > w ? 'portrait' : (w > h ? 'landscape' : '');
  
  const card = document.createElement('div');
  card.className = `img-card ${typeClass}`;
  
  card.innerHTML = `
    <div class="img-prompt-tag">${promptText}</div>
    <div class="fallback-tag">Arkaios Bridge Generation</div>
    <img src="${url}" loading="lazy" referrerPolicy="no-referrer">
    <div class="img-actions">
      <button class="btn-dl" onclick="window.open('${url}', '_blank')">Visualizar HD</button>
      <button class="btn-del" onclick="this.closest('.img-card').remove(); updateCounter();">✕</button>
    </div>
  `;
  
  document.getElementById('gallery').prepend(card);
  updateCounter();
}

function updateCounter(){
  const count = document.querySelectorAll('.img-card').length;
  document.getElementById('galleryCount').textContent = `${count} captura${count!==1?'s':''}`;
}

function clearGallery(){
  if(!confirm("¿Limpiar el feed de señales?")) return;
  document.getElementById('gallery').innerHTML = `<div class="empty-state" id="emptyState" style="grid-column:1/-1;"><div class="icon">🛰️</div><p>Esperando señal del orquestador...</p></div>`;
  updateCounter();
}

function showToast(msg){
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => {
    t.style.opacity = '0';
    setTimeout(() => t.remove(), 500);
  }, 3000);
}
</script>
</body>
